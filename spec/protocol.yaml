  - id: 2493
    name: user.badge_received
    realm: inventory
    summary: Notify that the user has received a new badge
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user earns a new badge from an achievement, purchase, or promotional code. The client adds it to the badge inventory.

      '
    receiver: 'The client appends the new badge to the local inventory and may display a badge-received notification overlay.

      '
    fields:
    - name: badgeId
      type: int32
      required: true
      description: Numeric badge identifier
    - name: badgeCode
      type: string
      required: true
      description: Badge code string used to look up badge art
    header: USER_BADGES_ADD
  - id: 2501
    name: user.badge_point_limits
    realm: achievements-talents
    summary: Deliver point thresholds for badge achievement levels
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_badge_point_limits` (c2s 1371). For each achievement prefix the server lists how many points are required to reach each badge level.

      '
