    - 'Each entry: `int32` userId, `string` username, `string` userClass (the class type string for that user).

      '
    header: USER_CLASSIFICATION
  - id: 2875
    name: user.home_room
    realm: user-profile
    summary: Deliver the user's home room and room to enter on login
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the post-authentication burst to inform the client of the user''s configured home room and which room to navigate to automatically (if any).

      '
    receiver: 'The client stores the home room ID. If `roomIdToEnter` is non-zero the client navigates to that room automatically after the login burst completes.

      '
