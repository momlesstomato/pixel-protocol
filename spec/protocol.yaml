    header: BADGE_REQUEST_FULFILLED
  - id: 563
    name: user.check_name_result
    realm: user-profile
    summary: Return validation result for a candidate display name
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.check_name` (c2s 3950). Provides a result code and optional alternative name suggestions when the requested name is unavailable.

      '
    receiver: 'The client shows a validation message. On result code 0 the name is available and the user may confirm. On other codes the client may display suggestions from the list.

      '
    fields:
    - name: resultCode
      type: int32
      required: true
      description: '0 = valid and available, 4 = too short, 5 = too long, 6 = forbidden characters, 7 = inappropriate words, 8 = already taken, 9 = staff-only prefix

        '
    - name: name
      type: string
      required: true
      description: The candidate name that was evaluated
    - name: suggestionCount
      type: int32
      required: true
      description: Number of alternative name suggestions that follow
    notes:
    - 'Each suggestion: `string` suggestedName.'
    header: CHECK_USER_NAME
  - id: 118
    name: user.change_name_result
    realm: user-profile
    summary: Return the result of a display name change request
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.change_name` (c2s 2977). On success the result code is 0 and the change has been committed. On failure the code indicates why the name was rejected and suggestions
      may be provided.

      '
    receiver: 'The client reads the result code. On success it updates the local username display and closes the name-change flow. On failure it shows suggestions and remains in the flow.

      '
    fields:
    - name: resultCode
      type: int32
      required: true
      description: '0 = changed successfully, 4 = too short, 5 = too long, 6 = forbidden characters, 7 = inappropriate words, 8 = already taken, 9 = staff-only prefix

        '
    - name: name
      type: string
      required: true
      description: The name that was evaluated
    - name: suggestionCount
      type: int32
      required: true
      description: Number of alternative name suggestions that follow
    notes:
    - 'Each suggestion: `string` suggestedName.'
    header: USER_CHANGE_NAME
  - id: 1503
    name: user.approve_name_result
    realm: user-profile
    summary: Return the approval result for a catalog or pet name
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.approve_name` (c2s 2109). Indicates whether the submitted name passed the word filter and any additional validation info from the screening service.

      '
    receiver: 'The client reads the result code. If 0 the name is approved and the flow can continue (e.g. confirming pet name). If non-zero, an error is shown and the user must choose a different name.

      '
    fields:
    - name: result
      type: int32
      required: true
      description: '0 = approved, 1 = moderated (inappropriate words), 2 = rejected for other reasons

        '
    - name: validationInfo
      type: string
      required: true
      description: Additional validation detail string from the screening service
    header: CATALOG_APPROVE_NAME_RESULT
  - id: 2275
