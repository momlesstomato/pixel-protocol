  - id: 2586
    name: user.perks
    realm: user-profile
    summary: Deliver the list of perk allowances for the authenticated user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the post-authentication burst. Each entry names a server-defined feature (perkCode), carries an error message string (empty when the perk is granted), and a boolean that indicates
      whether the feature is available to this user.

      '
