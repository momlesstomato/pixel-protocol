    - name: category
      type: string
      required: true
      description: Search category code whose display mode is being set.
    - name: listMode
      type: int32
      required: true
      description: 'Display mode integer: 0 = list, 1 = thumbnails, 2 = thumbnails without mode toggle.

        '
