    - name: guildId
      type: int32
      required: true
      description: ID of the guild in which the action was attempted
    - name: reason
      type: int32
      required: true
      description: 'Reason code for the failure: 1 = no admin permission, 2 = target not a member, 3 = cannot demote owner

        '
