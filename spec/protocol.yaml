  - id: 966
    name: user.classification
    realm: user-profile
    summary: Deliver user ID, username, and class type for a set of users
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server with the user IDs, usernames, and class type strings for a batch of users. The class type string corresponds to the value previously sent by those users in `user.set_classification`
      (c2s 2285). The client stores two maps keyed by user ID: one for usernames and one for class type strings.

      '
