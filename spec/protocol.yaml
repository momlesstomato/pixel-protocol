  - id: 818
    name: user.guild_member_mgmt_failed
    realm: groups-forums
    summary: Report that a guild member management action failed
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when an attempt to manage a guild member (kick, promote, demote, etc.) fails. Both the affected guild and the reason are provided.

      '
