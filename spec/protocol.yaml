    summary: Remove a room from the user's favourites list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user un-favourites a room.

      '
    receiver: 'The server removes the room from the stored list and responds with `navigator.favourite_changed` (s2c 2524) with `added = false`. Confirmed in GLADIATOR.

      '
    fields:
    - name: roomId
      type: int32
      required: true
      description: ID of the room to remove from favourites.
    header: ROOM_FAVORITE_REMOVE
  - id: 2230
    name: navigator.get_room_info
    realm: navigator
    summary: Request detailed information about a specific room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to fetch full room metadata before entering or previewing a room. The `enterRoom` flag signals that the client intends to enter the room immediately after receiving the response. The `forwardRoom`
      flag signals that this request originated from a forward/redirect flow.

      '
    receiver: 'The server responds with `navigator.room_info` (s2c 687) containing the full room data record plus moderation and chat settings. Confirmed in GLADIATOR.

      '
    fields:
    - name: roomId
      type: int32
      required: true
      description: ID of the room to query.
    - name: enterRoom
      type: int32
      required: true
      description: '1 if the client intends to enter the room after receiving the response; 0 otherwise.

        '
    - name: forwardRoom
      type: int32
      required: true
      description: '1 if this request originates from a room-forward flow (redirect); 0 for a direct lookup.

        '
    header: GET_GUEST_ROOM
  - id: 2128
    name: navigator.can_create_room
    realm: navigator
    summary: Check whether the user is permitted to create a new room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent before the room-creation UI is opened to determine if the user has reached their room ownership limit. Carries no payload.

      '
    receiver: 'The server compares the user''s current room count against their allowed maximum and responds with `navigator.can_create_room` (s2c 378). Confirmed in GLADIATOR.

      '
    fields: []
    header: CAN_CREATE_ROOM
  - id: 2752
    name: navigator.create_room
    realm: navigator
    summary: Create a new room with the specified configuration
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user submits the room-creation form. The server validates all fields before creating the room.

      '
    receiver: 'The server validates the name (3–25 characters, passes word filter), description (≤128 characters), model name, category, visitor cap (≤250), and trade type (0–2). If the user is already
      at their room limit, the server responds with `navigator.can_create_room` (s2c 378) reporting the limit reached. On success, the server creates the room and responds with `navigator.room_created`
      (s2c 1304). Confirmed in GLADIATOR.

      '
    fields:
    - name: roomName
      type: string
      required: true
      description: Display name for the new room (3–25 characters).
    - name: roomDescription
      type: string
      required: true
      description: 'Optional description shown in room listings (0–128 characters).

        '
    - name: modelName
      type: string
      required: true
      description: 'Internal identifier of the room layout template to use.

        '
    - name: categoryId
      type: int32
      required: true
      description: 'ID of the navigator category under which the room is listed. Must match a category the user is permitted to use.

        '
    - name: maxVisitors
      type: int32
      required: true
      description: Maximum number of simultaneous visitors (1–250).
    - name: tradeType
      type: int32
      required: true
      description: 'Trading permission mode: 0 = trading allowed, 1 = trading with rights only, 2 = trading disabled.

        '
    header: ROOM_CREATE
  - id: 3027
