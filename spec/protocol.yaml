    - name: userId
      type: int32
      required: true
      description: ID of the user whose extended profile has changed
    header: EXTENDED_PROFILE_CHANGED
  - id: 612
    name: user.email_status
    realm: user-profile
    summary: Deliver the account email address and verification status
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_email_status` (c2s 2557). Provides the current email address, whether it has been verified, and whether the user may change it.

      '
    receiver: 'The client populates the account settings email section and may show a "verify your email" prompt if `isVerified` is false.

      '
    fields:
    - name: email
      type: string
      required: true
      description: Current email address on file for the account
    - name: isVerified
      type: boolean
      required: true
      description: Whether the email address has been verified
    - name: allowChange
      type: boolean
      required: true
      description: Whether the user is permitted to change the email address
    header: EMAIL_STATUS
  - id: 1815
    name: user.change_email_result
    realm: user-profile
    summary: Report the result of an email address change request
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.change_email` (c2s 3965). The result code indicates success or the reason the change was rejected.

      '
    receiver: 'The client shows a success or error notification. On success it updates the displayed email address in account settings.

      '
    fields:
    - name: result
      type: int32
      required: true
      description: '0 = changed successfully, 1 = invalid address format, 2 = address already in use, 3 = change not allowed

        '
    header: CHANGE_EMAIL_RESULT
  - id: 2707
    name: user.welcome_gift_status
    realm: user-profile
    summary: Deliver welcome-gift email status and furni eligibility
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the welcome-gift flow to provide the current email status and the ID of the furniture item gated behind email verification. `requestedByUser` indicates whether the user explicitly
      requested this status.

      '
    receiver: 'The client uses the status to display the correct step of the welcome-gift UI (provide email, verify email, or claim gift).

      '
    fields:
    - name: email
      type: string
      required: true
      description: Current email address on file (may be empty if none set)
    - name: isVerified
      type: boolean
      required: true
      description: Whether the email address has been verified
    - name: allowChange
      type: boolean
      required: true
      description: Whether the user may update the email address
    - name: furniId
      type: int32
      required: true
      description: ID of the welcome-gift furni item pending email verification
    - name: requestedByUser
      type: boolean
      required: true
      description: Whether this status was sent in response to a user action
    header: WELCOME_GIFT_STATUS
  - id: 2293
    name: user.welcome_gift_change_email_result
    realm: user-profile
    summary: Report the result of a welcome-gift email update
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.welcome_gift_change_email` (c2s 66). Indicates whether the email address was successfully recorded for the welcome-gift flow.

      '
    receiver: 'The client reads the result and advances or retries the welcome-gift email step accordingly.

      '
    fields:
    - name: result
      type: int32
      required: true
      description: '0 = email recorded successfully, 1 = invalid address, 2 = address already in use

        '
    header: WELCOME_GIFT_CHANGE_EMAIL_RESULT
  - id: 1683
    name: user.banned
    realm: user-profile
    summary: Notify the client that the user has been banned
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server when a moderator issues a ban against the connected user. The message string explains the reason. The server will close the connection shortly after sending this packet.

      '
    receiver: 'The client displays the ban message to the user and prepares for disconnection. No recovery action is available from the client side.

      '
    fields:
    - name: message
      type: string
      required: true
      description: Human-readable ban reason or explanation message
    header: USER_BANNED
  - id: 1605
    name: messenger.init
    realm: messenger-social
    summary: Deliver messenger configuration and friend categories to the client
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.init` (c2s 2781). Delivers the friend limit thresholds and the list of custom friend categories the user has created.

      '
    receiver: 'The client stores the limit values to enforce friend list capacity in the UI and populates the category dropdown. The client then sends `messenger.refresh` (c2s 1419) to request the friend
      list fragments. Confirmed in GLADIATOR and GALAXY.

      '
    fields:
    - name: userFriendLimit
      type: int32
      required: true
      description: 'Maximum number of friends allowed for this user. May be elevated by club membership or a server-side permission override.

        '
    - name: normalFriendLimit
      type: int32
      required: true
      description: Maximum friend count for standard (non-club) accounts.
    - name: extendedFriendLimit
      type: int32
      required: true
      description: Maximum friend count for club (VIP) accounts.
    - name: categoryCount
      type: int32
      required: true
      description: Number of custom friend categories that follow.
    notes:
    - 'After `categoryCount`, each category entry is two fields: `id` (int32) and `name` (string).

      '
    header: MESSENGER_INIT
  - id: 3130
    name: messenger.friends
    realm: messenger-social
    summary: Deliver one fragment of the user's friend list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent one or more times in response to `messenger.refresh` (c2s 1419). Large friend lists are split into fragments of up to 750 friends each. The client must receive all fragments before the
      friend list is complete.

      '
    receiver: 'The client accumulates fragments using `totalFragments` and `fragmentNumber` (0-indexed) to know when all friends have been received. Confirmed in GLADIATOR.

      '
    fields:
    - name: totalFragments
      type: int32
      required: true
      description: Total number of fragments that make up the complete friend list.
    - name: fragmentNumber
      type: int32
      required: true
      description: Zero-based index of this fragment within the full set.
    - name: friendCount
      type: int32
      required: true
      description: Number of friend records in this fragment.
    notes:
    - 'After `friendCount`, each friend entry contains the following fields in order: `id` (int32), `name` (string), `gender` (int32; 0=male, 1=female), `online` (boolean), `followingAllowed` (boolean;
      true when the friend is in a room and permits following), `figure` (string; figure string, empty when offline), `categoryId` (int32; -1 if uncategorized), `motto` (string), `realName` (string), `lastAccess`
      (string; ISO-format timestamp of last logout, empty when online), `persistedMessageUser` (boolean; true when offline messaging is available), `vipMember` (boolean), `pocketHabboUser` (boolean), `relationshipStatus`
      (int16; 0=none, 1=heart, 2=smile, 3=wave).

      '
    header: MESSENGER_FRIENDS
  - id: 2800
    name: messenger.update
    realm: messenger-social
    summary: Push incremental changes to the friend list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent whenever the friend list changes: a friend comes online or goes offline, is added, or is removed. Also sent as an acknowledgement after `messenger.remove_friend` (c2s 1689).

      '
    receiver: 'The client applies each update record to its local friend list. Category changes listed before the update entries must be applied first. Confirmed in GLADIATOR and GALAXY.

      '
    fields:
    - name: categoryCount
      type: int32
      required: true
      description: 'Number of category records that follow. Each has `id` (int32) and `name` (string). The category list replaces the previous one.

        '
    - name: updateCount
      type: int32
      required: true
      description: Number of update entries that follow.
    notes:
    - 'After `updateCount`, each update entry begins with `type` (int32). When `type` is -1 (removal), the next field is `id` (int32) and no further data follows for that entry. When `type` is 0 (update)
      or 1 (addition), the full friend data record follows starting with `id` (see `messenger.friends` s2c 3130 for the field order).

      '
    header: MESSENGER_UPDATE
  - id: 2219
    name: messenger.friend_request
    realm: messenger-social
    summary: Notify the client of a new incoming friend request
    since: nitro-1.6.6
    phase: session
    sender: 'Pushed to the client when another user sends them a friend request via `messenger.request_friend` (c2s 3157) and the target is currently online.

      '
    receiver: 'The client adds the request to the pending friend request list and may display a notification. The user can then accept or decline via `messenger.accept_friend` (c2s 137) or `messenger.decline_friend`
      (c2s 2890). Confirmed in GLADIATOR.

      '
    fields:
    - name: requestId
      type: int32
      required: true
      description: 'Numeric ID of the sender''s user account. Used as the request identifier when accepting or declining.

        '
    - name: requesterName
      type: string
      required: true
      description: Display name of the user sending the request.
    - name: figureString
      type: string
      required: true
      description: Avatar figure string of the requesting user.
    header: MESSENGER_REQUEST
  - id: 280
    name: messenger.friend_requests
    realm: messenger-social
    summary: Deliver the full list of pending incoming friend requests
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.get_requests` (c2s 2448). Contains all outstanding requests addressed to the user, ordered by arrival time.

      '
    receiver: 'The client replaces its local request list with the received entries. Confirmed in GLADIATOR.

      '
    fields:
    - name: totalRequests
      type: int32
      required: true
      description: 'Total count of all pending requests (may differ from the immediately following count if the list is paged).

        '
    - name: requestCount
      type: int32
      required: true
      description: Number of request records in this packet.
    notes:
    - 'After `requestCount`, each request entry contains: `requestId` (int32; same as the sender''s user ID), `requesterName` (string), `figureString` (string).

      '
    header: MESSENGER_REQUESTS
  - id: 1587
    name: messenger.chat
    realm: messenger-social
    summary: Deliver an incoming private message from a friend
    since: nitro-1.6.6
    phase: session
    sender: 'Pushed to the recipient when a friend sends a private message via `messenger.chat` (c2s 3567). The `secondsSinceSent` field allows the client to display the correct timestamp even when the
      recipient was offline.

      '
    receiver: 'The client opens or updates the conversation window for the sender and displays the message with the appropriate timestamp. The optional `extraData` field carries additional context for group-chat
      or moderation messages. Confirmed in GLADIATOR.

      '
    fields:
    - name: senderId
      type: int32
      required: true
      description: User ID of the friend who sent the message.
    - name: messageText
      type: string
      required: true
      description: UTF-8 text content of the private message.
    - name: secondsSinceSent
      type: int32
      required: true
      description: 'Number of seconds that have elapsed since the message was sent. Used to reconstruct the original send timestamp on the client.

        '
    - name: extraData
      type: string
      required: false
      description: 'Optional metadata string. Present only when `bytesAvailable` is non-zero after the previous fields. Used for group-chat context such as sender name and figure.

        '
    header: MESSENGER_CHAT
  - id: 896
    name: messenger.accept_result
    realm: messenger-social
    summary: Report failures encountered while processing friend-request acceptances
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.accept_friend` (c2s 137) when one or more acceptances fail. Only failed entries are listed; successful acceptances are reflected in `messenger.update` (s2c 2800).

      '
    receiver: 'The client reads each failure record and displays the appropriate error state for the affected request. Confirmed in GLADIATOR (as MessengerErrorComposer).

      '
    fields:
    - name: failureCount
      type: int32
      required: true
      description: Number of failure records that follow.
    notes:
    - 'After `failureCount`, each failure entry contains: `userId` (int32; the requester whose acceptance failed), `errorCode` (int32; 1 = own list full, 2 = target list full, 3 = target not accepting requests,
      4 = target not found).

      '
    header: MESSENGER_ACCEPT_FRIENDS
  - id: 973
    name: messenger.search_result
    realm: messenger-social
    summary: Deliver user-search results split into friends and others
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.search` (c2s 1210). Results are split into two groups: friends matching the query come first, followed by non-friends.

      '
    receiver: 'The client renders the two groups in separate sections of the search results panel. Confirmed in GLADIATOR (as UserSearchResultComposer).

      '
    fields:
    - name: friendCount
      type: int32
      required: true
      description: Number of friend-match entries that follow.
    - name: otherCount
      type: int32
      required: true
      description: 'Number of non-friend-match entries that follow after the friend entries.

        '
    notes:
    - 'Each search result entry (both friend and other groups) contains: `avatarId` (int32), `avatarName` (string), `avatarMotto` (string), `isOnline` (boolean), `canFollow` (boolean), `lastOnlineData`
      (string; ISO-format last-seen timestamp), `avatarGender` (int32; 0=male, 1=female), `avatarFigure` (string), `realName` (string).

      '
    header: MESSENGER_SEARCH
  - id: 3870
    name: messenger.room_invite
    realm: messenger-social
    summary: Deliver a room invitation sent by a friend
    since: nitro-1.6.6
    phase: session
    sender: 'Pushed to each recipient when a friend sends a room invitation via `messenger.room_invite` (c2s 1276).

      '
    receiver: 'The client displays a notification with the invitation message and provides a button to enter the sender''s current room. Confirmed in GLADIATOR.

      '
    fields:
    - name: senderId
      type: int32
      required: true
      description: User ID of the friend who sent the invitation.
    - name: message
      type: string
      required: true
      description: 'Custom text the sender included with the invitation.

        '
    header: MESSENGER_INVITE
  - id: 462
    name: messenger.room_invite_error
    realm: messenger-social
    summary: Report recipients that could not be reached by a room invitation
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.room_invite` (c2s 1276) when one or more recipients could not receive the invitation.

      '
    receiver: 'The client displays the error code and lists the user IDs that were unreachable. Confirmed in GLADIATOR.

      '
    fields:
    - name: errorCode
      type: int32
      required: true
      description: General error code describing the type of failure.
    - name: failedCount
      type: int32
      required: true
      description: Number of failed recipient user IDs that follow.
    notes:
    - After `failedCount`, each entry is a single `int32` user ID that did not receive the invitation.
    header: MESSENGER_INVITE_ERROR
  - id: 892
    name: messenger.message_error
    realm: messenger-social
    summary: Report a failure when sending a private message or friend request
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when `messenger.chat` (c2s 3567) or a friend request operation fails. The `senderId` is 0 when the error relates to a request rather than a specific message exchange.

      '
    receiver: 'The client displays an error in the relevant conversation or request context. Confirmed in GLADIATOR (as FriendRequestErrorComposer).

      '
    fields:
    - name: senderId
      type: int32
      required: true
      description: 'User ID involved in the failed operation, or 0 when the error relates to a friend request rather than a message.

        '
    - name: errorCode
      type: int32
      required: true
      description: 'Error code: 1 = own friend list full, 2 = target friend list full, 3 = target not accepting requests, 4 = target not found.

        '
    header: MESSENGER_MESSAGE_ERROR
  - id: 3359
    name: messenger.instant_message_error
    realm: messenger-social
    summary: Report a delivery failure for a specific private message
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when a private message sent via `messenger.chat` (c2s 3567) could not be delivered. Provides the error code, the target user ID, and the original message text so the client can display
      a contextual error.

      '
    receiver: 'The client displays the failure reason in the conversation window for the identified user. Confirmed in GLADIATOR (as UnknownMessengerErrorComposer).

      '
    fields:
    - name: errorCode
      type: int32
      required: true
      description: Code identifying why the message could not be delivered.
    - name: userId
      type: int32
      required: true
      description: User ID of the intended recipient.
    - name: message
      type: string
      required: true
      description: The original message text that failed to send.
    header: MESSENGER_INSTANCE_MESSAGE_ERROR
  - id: 1210
    name: messenger.find_friends_result
    realm: messenger-social
    summary: Report the outcome of the automated friend-finder process
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.find_new_friends` (c2s 516) to indicate whether the server successfully initiated the pairing process.

      '
    receiver: 'The client uses the result to update the UI: on success it may navigate the user to a matching room; on failure it shows an error. Confirmed in GLADIATOR and GALAXY.

      '
    fields:
    - name: success
      type: boolean
      required: true
      description: True when the server started the pairing process successfully.
    header: MESSENGER_FIND_FRIENDS
  - id: 3048
    name: messenger.follow_failed
    realm: messenger-social
    summary: Notify the client that following a friend to their room failed
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `messenger.follow_friend` (c2s 3997) when the follow cannot be completed (e.g. the friend is in a private room, has disabled following, or went offline).

      '
    receiver: 'The client displays an error message explaining why the follow failed. Confirmed in GLADIATOR (as StalkErrorComposer).

      '
    fields:
    - name: errorCode
      type: int32
      required: true
      description: 'Reason the follow failed: 1 = friend not in a room, 2 = room is inaccessible.

        '
    header: MESSENGER_FOLLOW_FAILED
  - id: 3082
    name: messenger.friend_notification
    realm: notifications-landing
    summary: Push a friend-related state notification to the client
    since: nitro-1.6.6
    phase: session
    sender: 'Pushed when a notable event involving a friend occurs, such as a friend entering or leaving a room. The `typeCode` identifies the event type and determines how the client renders the notification.

      '
    receiver: 'The client displays a toolbar notification or updates the friend list entry for `avatarId` based on `typeCode`. The `message` string carries contextual text (e.g. the room name). Confirmed
      in GLADIATOR (as FriendToolbarNotificationComposer).

      '
    fields:
    - name: typeCode
      type: int32
      required: true
      description: 'Event type identifier: 1 = friend entered a room, 2 = friend left all rooms.

        '
    - name: avatarId
      type: int32
      required: true
      description: User ID of the friend who triggered the event.
    - name: message
      type: string
      required: true
      description: 'Contextual text associated with the event (e.g. room name when a friend enters a room).

        '
    header: MESSENGER_FRIEND_NOTIFICATION
  - id: 2803
    name: messenger.minimail_count
    realm: messenger-social
    summary: Deliver the current count of unread minimail messages
    since: nitro-1.6.6
    phase: session
    sender: 'Sent on login and whenever the unread message count changes. Minimail is a persistent offline-messaging feature distinct from real-time private chat.

      '
    receiver: 'The client updates the minimail unread-count badge in the UI. Confirmed in GLADIATOR.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of unread minimail messages in the user's inbox.
    header: MESSENGER_MINIMAIL_COUNT
  - id: 1911
    name: messenger.minimail_new
    realm: messenger-social
    summary: Notify the client that a new minimail message has arrived
    since: nitro-1.6.6
    phase: session
    sender: 'Pushed when a new minimail message is delivered to the user. Carries no payload; the client is expected to fetch the updated count via `messenger.minimail_count` (s2c 2803) or to open the inbox
      to retrieve message content.

      '
    receiver: 'The client shows a notification prompting the user to check their minimail inbox. Confirmed in GLADIATOR.

      '
    fields: []
    header: MESSENGER_MINIMAIL_NEW
  - id: 518
    name: navigator.settings
    realm: navigator
    summary: Deliver the user's saved navigator window layout settings
    since: nitro-1.6.6
    phase: session
    sender: 'Sent as part of the navigator init burst triggered by `navigator.init` (c2s 2110). Restores the navigator window to the position, size, and display mode the user had when they last closed it.

      '
    receiver: 'The client positions and sizes the navigator window according to the received values and sets the left panel visibility and results mode. Confirmed in GLADIATOR.

      '
    fields:
    - name: windowX
      type: int32
      required: true
      description: Horizontal screen position of the navigator window.
    - name: windowY
      type: int32
      required: true
      description: Vertical screen position of the navigator window.
    - name: windowWidth
      type: int32
      required: true
      description: Width of the navigator window in pixels.
    - name: windowHeight
      type: int32
      required: true
      description: Height of the navigator window in pixels.
    - name: leftPanelHidden
      type: boolean
      required: true
      description: Whether the left search-filter panel is hidden.
    - name: resultsMode
      type: int32
      required: true
      description: 'Display mode for search results: 0 = list view, 1 = thumbnail view, 2 = thumbnail-only (no mode toggle).

        '
    header: NAVIGATOR_SETTINGS
  - id: 3052
    name: navigator.metadata
    realm: navigator
    summary: Deliver the top-level search context structure with saved searches
    since: nitro-1.6.6
    phase: session
    sender: 'Sent as part of the navigator init burst. Defines the ordered list of top-level search tabs (contexts) and any saved searches nested within each.

      '
    receiver: 'The client renders the search tab bar from the received contexts and populates each tab''s saved-search list. Confirmed in GLADIATOR.

      '
    fields:
    - name: contextCount
      type: int32
      required: true
      description: Number of top-level search context entries that follow.
    notes:
    - 'Each context entry contains: `code` (string; identifies the search tab), `savedSearchCount` (int32; number of saved searches under this context), then for each saved search: `id` (int32), `code`
      (string), `filter` (string), `localization` (string).

      '
    header: NAVIGATOR_METADATA
  - id: 3984
    name: navigator.saved_searches
    realm: navigator
    summary: Deliver the user's full list of saved searches
    since: nitro-1.6.6
    phase: session
    sender: 'Sent as part of the navigator init burst and after a search is saved or deleted. Contains all saved searches flat (not grouped by context).

      '
    receiver: 'The client replaces its local saved-search list with the received entries. Confirmed in GLADIATOR.

      '
    fields:
    - name: searchCount
      type: int32
      required: true
      description: Number of saved-search entries that follow.
    notes:
    - 'Each entry contains: `id` (int32; server-assigned identifier), `code` (string; search context), `filter` (string; free-text filter), `localization` (string; display label).

      '
    header: NAVIGATOR_SEARCHES
  - id: 2690
    name: navigator.search_result
    realm: navigator
    summary: Deliver room search results for a given search context
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `navigator.search` (c2s 249). Contains the query echo and a list of result-list groups, each corresponding to a sub-category within the search context.

      '
    receiver: 'The client renders each result list as a collapsible group within the navigator results panel, applying the display mode and action from each group. Confirmed in GLADIATOR.

      '
    fields:
    - name: code
      type: string
      required: true
      description: Echo of the search context code from the request.
    - name: data
      type: string
      required: true
      description: Echo of the free-text filter from the request.
    - name: resultListCount
      type: int32
      required: true
      description: Number of result-list group entries that follow.
    notes:
    - 'Each result-list entry contains: `code` (string; sub-category identifier), `data` (string; label or query used for this group), `action` (int32; 0 = none, 1 = more results available, 2 = go back),
      `closed` (boolean; true when the group is collapsed by default), `mode` (int32; 0 = list, 1 = thumbnails, 2 = thumbnails-only), `roomCount` (int32), then `roomCount` room data records.

      '
    - 'Each room data record contains: `roomId` (int32), `roomName` (string), `ownerId` (int32), `ownerName` (string), `doorMode` (int32; 0 = open, 1 = doorbell, 2 = password, 3 = invisible), `userCount`
      (int32), `maxUserCount` (int32), `description` (string), `tradeMode` (int32), `score` (int32), `ranking` (int32), `categoryId` (int32), `tagCount` (int32) followed by `tagCount` tag strings, `bitMask`
      (int32), then conditional fields based on bitmask bits: bit 1 adds `officialRoomPicRef` (string); bit 2 adds `groupId` (int32), `groupName` (string), `groupBadge` (string); bit 4 adds `adName` (string),
      `adDescription` (string), `adExpiresInMin` (int32); bit 8 sets `showOwner`; bit 16 sets `allowPets`; bit 32 sets `displayAd`.

      '
    header: NAVIGATOR_SEARCH
  - id: 1543
    name: navigator.collapsed
    realm: navigator
    summary: Deliver the list of search category codes that are currently collapsed
    since: nitro-1.6.6
    phase: session
    sender: 'Sent as part of the navigator init burst. Lists the category codes the user has collapsed so the client can restore the correct state.

      '
    receiver: 'The client marks each listed category as collapsed in the navigator UI. Confirmed in GLADIATOR.

      '
    fields:
    - name: categoryCount
      type: int32
      required: true
      description: Number of category code strings that follow.
    notes:
    - After `categoryCount`, each entry is a `string` category code.
    header: NAVIGATOR_COLLAPSED
  - id: 3104
    name: navigator.lifted
    realm: navigator
    summary: Deliver the list of featured (lifted) rooms shown at the top of the navigator
    since: nitro-1.6.6
    phase: session
    sender: 'Sent as part of the navigator init burst. Contains rooms selected by the server to be featured prominently in the navigator header area.

      '
    receiver: 'The client renders the lifted rooms as a highlighted row at the top of the navigator. Confirmed in GLADIATOR.

      '
    fields:
    - name: roomCount
      type: int32
