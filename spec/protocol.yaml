  - id: 15
    name: moderation.pick_issues
    realm: moderation-safety
    summary: Pick moderation issues for review
    since: nitro-1.6.6
    phase: session
    sender: 'The client sends this when a moderator selects one or more open issues from the issue queue to begin review. It contains a list of issue identifiers to claim.

      '
    receiver: 'The server assigns the listed issues to the requesting moderator, removing them from the shared queue. Other moderators receive updated queue state. The server responds with issue details
      for the claimed issues.

      '
    fields:
    - name: issueIds
      type: list<int32>
      required: true
      description: Array of issue identifiers to pick, length-prefixed with an int32 count.
    - name: retryEnabled
      type: boolean
      required: true
      description: Whether the moderator wants retry logic enabled for this pick operation.
    - name: retryCount
      type: int32
      required: true
      description: Number of retry attempts if the pick fails due to contention.
    - name: message
      type: string
      required: true
      description: Optional note attached to the pick action.
    header: PICK_ISSUES
