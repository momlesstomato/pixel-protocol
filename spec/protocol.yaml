    summary: Deliver a link string for the client to dispatch as an event
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server to push a link string to the client. The client passes the string directly to `Nitro.createLinkEvent`, which dispatches it as an in-client link event. The format and meaning
      of the link string are server-defined.

      '
    receiver: 'The client calls `Nitro.createLinkEvent` with the received string, triggering whatever handler is registered for that link type.

      '
