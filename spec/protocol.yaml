  - id: 3817
    name: navigator.favourite_add
    realm: navigator
    summary: Add a room to the user's favourites list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user marks a room as a favourite. The server adds it to the stored list and sends back confirmation.

      '
    receiver: 'The server records the favourite and responds with `navigator.favourite_changed` (s2c 2524) with `added = true`. The updated count is reflected in `navigator.favourites` (s2c 151). Confirmed
      in GLADIATOR.

