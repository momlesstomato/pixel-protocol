    receiver: 'The server creates a new moderation issue, stores the chat evidence, and queues it for moderator review. The server responds with a CFH result message to confirm submission.

      '
    fields:
    - name: message
      type: string
      required: true
      description: The user-written report description.
    - name: topicIndex
      type: int32
      required: true
      description: Index of the selected help topic category.
    - name: reportedUserId
      type: int32
      required: true
      description: User identifier of the player being reported.
    - name: reportedRoomId
      type: int32
      required: true
      description: Room identifier where the incident occurred.
    - name: chatEntries
      type: list<string>
      required: true
      description: 'Chat evidence as length-prefixed alternating pairs: each pair consists of a pattern identifier (string) followed by the message text (string). The list count is half the raw entry count.'
    header: CALL_FOR_HELP
