    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier that was activated
    - name: duration
      type: int32
      required: true
      description: Remaining duration of the active effect in seconds
    - name: isPermanent
      type: boolean
      required: true
      description: Whether the effect never expires
    header: USER_EFFECT_ACTIVATE
  - id: 3473
    name: user.effect_selected
    realm: inventory
    summary: Confirm the currently selected avatar effect
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.effect_enable` (c2s 1752) to confirm which effect is currently selected in the inventory.

      '
    receiver: 'The client highlights the confirmed effect in the inventory panel.

      '
    fields:
    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier that is now selected
    header: AVATAR_EFFECT_SELECTED
  - id: 717
    name: user.badges
    realm: inventory
    summary: Deliver the full badge inventory and current slot assignments
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_badges` (c2s 2769). Contains two arrays: all badges owned and the badges currently equipped in display slots.

      '
    receiver: 'The client populates the badge inventory panel and updates the equipped-badge display.

      '
