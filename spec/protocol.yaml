    phase: session
    sender: 'Sent when the user removes a saved search. The search is identified by its server-assigned integer ID.

      '
    receiver: 'The server deletes the saved-search record. No confirmation packet is sent. Confirmed in GLADIATOR.

      '
    fields:
    - name: searchId
      type: int32
      required: true
      description: Server-assigned ID of the saved search to delete.
    header: NAVIGATOR_DELETE_SAVED_SEARCH
  - id: 3159
    name: navigator.settings_save
    realm: navigator
    summary: Persist the navigator window layout preferences
    since: nitro-1.6.6
    phase: session
    sender: 'Sent whenever the user repositions or resizes the navigator window, or toggles the left panel. The server persists these values and restores them via `navigator.settings` (s2c 518) on the next
      `navigator.init` (c2s 2110).

      '
    receiver: 'The server updates the stored window settings for the user. No response packet is sent. Confirmed in GLADIATOR.

      '
    fields:
    - name: windowX
      type: int32
      required: true
      description: Horizontal screen position of the navigator window.
    - name: windowY
      type: int32
      required: true
      description: Vertical screen position of the navigator window.
    - name: windowWidth
      type: int32
      required: true
      description: Width of the navigator window in pixels.
    - name: windowHeight
      type: int32
      required: true
      description: Height of the navigator window in pixels.
    - name: leftPanelHidden
      type: boolean
      required: true
      description: 'Whether the left search-filter panel is hidden.

        '
    - name: resultsMode
      type: int32
      required: true
      description: 'Display mode for search results: 0 = list view, 1 = thumbnail view, 2 = thumbnail-only (no mode toggle).

        '
    header: NAVIGATOR_SETTINGS_SAVE
  - id: 1202
    name: navigator.category_mode
