  s2c:
  - id: 1347
    name: handshake.init_diffie
    realm: handshake-security
    summary: Provide signed prime and generator for Diffie-Hellman
    since: nitro-1.6.6
    phase: crypto
    sender: 'The server sends this in response to a `handshake.init_diffie` (c2s 3110) request. It provides the Diffie-Hellman prime and generator, both RSA-signed so the client can verify their authenticity.
      The DH parameters may be generated per-session or shared across all sessions, depending on the implementation.

      '
    receiver: 'The client verifies the RSA signature using the known server public key, extracts the prime and generator, generates its own DH key pair, and proceeds to send `handshake.complete_diffie`
      (c2s 773) with its public key.

      '
    fields:
    - name: encryptedPrime
      type: string
      required: true
      description: RSA-signed Diffie-Hellman prime value
    - name: encryptedGenerator
      type: string
      required: true
      description: RSA-signed Diffie-Hellman generator value
    header: HANDSHAKE_INIT_DIFFIE
  - id: 3885
    name: handshake.complete_diffie
    realm: handshake-security
    summary: Return server public key and optional encryption flag
    since: nitro-1.6.6
    phase: crypto
    sender: 'Sent after the server has processed the client public key from `handshake.complete_diffie` (c2s 773) and derived the shared secret. The server provides its own public key and optionally signals
      whether server-to-client encryption is enabled. After sending this packet the server installs RC4 encryption on both directions.

      '
    receiver: 'The client decrypts the server public key using RSA, computes the same shared secret, and installs RC4 encryption on its end. From this point all traffic in both directions is RC4-encrypted.
      If the optional `serverClientEncryption` flag is present and false, the client may skip encrypting its outbound traffic (implementation dependent).

      '
    fields:
    - name: encryptedPublicKey
      type: string
      required: true
      description: RSA-encrypted server-side Diffie-Hellman public key
    - name: serverClientEncryption
      type: boolean
      required: false
      description: 'Optional flag: true enables server-to-client encryption'
    header: HANDSHAKE_COMPLETE_DIFFIE
  - id: 1488
    name: security.machine_id
    realm: handshake-security
    summary: Send normalized machine id back to client for storage
    since: nitro-1.6.6
    phase: auth
    sender: 'Sent by the server when the machine ID received in `security.machine_id` (c2s 2490) is malformed or missing. The server generates a valid 64-character hex identifier and returns it to the client.
      The server may also echo the original ID back unchanged.

      '
    receiver: 'The client stores the received machine ID in local persistent storage (e.g. localStorage or a cookie). This ID will be included in future `security.machine_id` (c2s 2490) packets to maintain
      device identity across sessions.

      '
    fields:
    - name: machineId
      type: string
      required: true
      description: Server-approved 64-character hex machine identifier
    header: SECURITY_MACHINE
  - id: 2491
    name: authentication.ok
    realm: handshake-security
    summary: Confirm successful SSO authentication
    since: nitro-1.6.6
    phase: auth
    sender: 'Sent by the server after the SSO ticket has been validated, the user session loaded, and the user marked as online. This is always the first packet in the post-authentication burst and is followed
      by availability status, initial pings, user permissions, subscription data, and other session-init messages.

      '
    receiver: 'The client transitions from the handshake phase to the authenticated phase. It marks the handshake as complete, dispatches an internal authenticated event, and immediately requests user info
      (e.g. `user.info` c2s 357). From this point the client may send game-state packets such as navigator searches or room entry.

      '
    fields: []
    header: AUTHENTICATED
  - id: 3523
    name: handshake.identity_accounts
    realm: handshake-security
    summary: Provide linked account identities associated with the session
    since: nitro-1.6.6
    phase: auth
    sender: 'Sent by the server during or after the authentication phase to inform the client of all account identities linked to the current session. Each entry contains a numeric account ID and a display
      name. This supports multi-account or identity-linked environments.

      '
    receiver: 'The client stores the list of identity accounts for later use (e.g. account switching UI). If the list is empty, the client may treat the session as a single-identity session.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of identity entries that follow
    notes:
    - 'After `count`, each entry is serialized as: `int32` accountId, `string` accountName.'
    - This uses an inline repeated structure rather than a prefixed `list<T>`.
    header: HANDSHAKE_IDENTITY_ACCOUNT
  - id: 3928
    name: client.ping
    realm: session-connection
    summary: Keepalive ping sent by server
    since: nitro-1.6.6
    phase: session
    sender: 'The server sends this empty packet at a fixed interval (typically every 30 seconds) to verify that the client is still connected and responsive. It is also sent once in the post-authentication
      burst to start the keepalive cycle immediately after login.

      '
    receiver: 'The client must respond with `client.pong` (c2s 2596) as soon as possible. If the client does not reply within the server''s pong timeout window (typically 60 seconds), the server will close
      the connection and treat the client as disconnected.

      '
    fields: []
    header: CLIENT_PING
  - id: 10
    name: client.latency_response
    realm: session-connection
    summary: Echo request id in response to latency test
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server immediately after receiving a `client.latency_test` (c2s 295). The server echoes back the same request ID without modification.

      '
    receiver: 'The client matches the returned request ID to the original probe, computes the elapsed time since sending, and uses the result as a round-trip time measurement. This value may be displayed
      in the UI or used for adaptive network adjustments.

      '
    fields:
    - name: requestId
      type: int32
      required: true
      description: Mirrors the requestId from the c2s latency test
    header: CLIENT_LATENCY
  - id: 2033
    name: availability.status
    realm: session-connection
    summary: Report hotel availability and shutdown state
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server in the post-authentication burst immediately after `authentication.ok`. It informs the client whether the hotel is open, whether a shutdown is in progress, and optionally
      whether the user is an authenticated (non-guest) account. All three server implementations send this with hardcoded values `(true, false, true)`.

      '
    receiver: 'The client reads the availability flags and may use them to display maintenance warnings, restrict navigation, or show a "hotel closed" overlay. If `isOpen` is false or `onShutdown` is true,
      the client may prevent the user from entering rooms or making purchases.

      '
    fields:
    - name: isOpen
      type: boolean
      required: true
      description: Whether the hotel is currently open for play
    - name: onShutdown
      type: boolean
      required: true
      description: Whether the hotel is in the process of shutting down
    - name: isAuthentic
      type: boolean
      required: false
      description: Whether the user is an authenticated (non-guest) account
    header: AVAILABILITY_STATUS
  - id: 600
    name: availability.time
    realm: session-connection
    summary: Report scheduled open/close time information
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server to inform the client about how long until the hotel opens or closes. The `isOpen` field indicates the current state; `minutesUntilChange` indicates when it will toggle.

      '
    receiver: 'The client may display a countdown timer or status message indicating when the hotel will open or close.

      '
    fields:
    - name: isOpen
      type: int32
      required: true
      description: Non-zero if the hotel is currently open, zero if closed
    - name: minutesUntilChange
      type: int32
      required: true
      description: Minutes until the hotel opens (if closed) or closes (if open)
    header: AVAILABILITY_TIME
  - id: 1004
    name: connection.error
    realm: session-connection
    summary: Report a connection-level error
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server when a connection-level error occurs, such as an invalid or unrecognized message from the client. The error includes the offending message ID, a numeric error code, and a
      timestamp.

      '
    receiver: 'The client may log the error for debugging, display a generic error notification, or ignore it. This packet does not necessarily cause a disconnect; it is informational.

      '
    fields:
    - name: messageId
      type: int32
      required: true
      description: Header ID of the message that caused the error
    - name: errorCode
      type: int32
      required: true
      description: Numeric error code
    - name: timestamp
      type: string
      required: true
      description: Server-side timestamp of the error occurrence
    header: CONNECTION_ERROR
  - id: 4000
    name: disconnect.reason
    realm: session-connection
    summary: Inform the client why it is being disconnected
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server just before closing the connection to explain why the session is ending. The reason field maps to a well-known enum of disconnect causes. When the field is absent or zero
      the disconnect is a normal logout.

      '
    receiver: 'The client reads the reason code and displays an appropriate message to the user (e.g. "You were banned", "Logged in from another location", "Hotel is closing"). The client should not attempt
      to reconnect automatically for ban or duplicate-login reasons.

      '
    fields:
    - name: reason
      type: int32
      required: false
      description: 'Disconnect reason code. 0 = normal logout, 1 = banned, 2 = concurrent login, 10 = still banned, 12 = hotel closed, 13 = duplicate IP login, 17 = no login permission, 22 = invalid login
        ticket, 112 = idle timeout, 113 = pong timeout. See notes for full enum.

        '
    notes:
    - 'Common reason codes: 0 LOGOUT, 1 JUST_BANNED, 2 CONCURRENT_LOGIN, 3 CONNECTION_LOST_TO_PEER, 10 STILL_BANNED, 12 HOTEL_CLOSED, 13 DUAL_LOGIN_BY_IP, 17 NO_LOGIN_PERMISSION, 18 DUPLICATE_CONNECTION,
      22 INVALID_LOGIN_TICKET, 112 IDLE_CONNECTION, 113 PONG_TIMEOUT.'
    - If the field is absent, clients should treat the reason as 0 (normal logout).
    header: DISCONNECT_REASON
  - id: 1050
    name: hotel.will_close
    realm: session-connection
    summary: Warn the client that the hotel will close soon
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server when a scheduled shutdown is approaching. The single field indicates how many minutes remain before the hotel closes.

      '
    receiver: 'The client displays a countdown warning to the user (e.g. "Hotel closing in 10 minutes"). The user should save any pending state.

      '
    fields:
    - name: minutes
      type: int32
      required: true
      description: Minutes until the hotel closes
    header: HOTEL_WILL_CLOSE_MINUTES
  - id: 1350
    name: hotel.maintenance
    realm: session-connection
    summary: Report current maintenance mode status
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server to indicate whether the hotel is in maintenance mode and when maintenance will end or begin.

      '
    receiver: 'The client may display a maintenance banner or countdown. If `isInMaintenance` is true, the client may restrict functionality.

      '
    fields:
    - name: isInMaintenance
      type: boolean
      required: true
      description: Whether the hotel is currently in maintenance
    - name: minutesUntilMaintenance
      type: int32
      required: true
      description: Minutes until maintenance starts (or ends if already in maintenance)
    - name: duration
      type: int32
      required: false
      description: Expected maintenance duration in minutes (default 15 if absent)
    header: HOTEL_MAINTENANCE
  - id: 3728
    name: hotel.closed_and_opens
    realm: session-connection
    summary: Inform the client when the hotel will reopen
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the hotel is currently closed and there is a known reopening schedule. Provides the hour and minute (server local time) at which the hotel will open.

      '
    receiver: 'The client displays a "Hotel is closed — opens at HH:MM" message.

      '
    fields:
    - name: openHour
      type: int32
      required: true
      description: Hour of the day the hotel will open (0-23)
    - name: openMinute
      type: int32
      required: true
      description: Minute of the hour the hotel will open (0-59)
    header: HOTEL_CLOSED_AND_OPENS
  - id: 2771
    name: hotel.closes_and_opens_at
    realm: session-connection
    summary: Announce upcoming close and reopen schedule
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server to announce that the hotel will close and reopen at specified times. Also indicates whether users will be forcefully disconnected at close time.

      '
    receiver: 'The client displays a schedule notification and prepares for potential disconnection if `userThrownOutAtClose` is true.

      '
    fields:
    - name: openHour
      type: int32
      required: true
      description: Hour of the day the hotel will reopen (0-23)
    - name: openMinute
      type: int32
      required: true
      description: Minute of the hour the hotel will reopen (0-59)
    - name: userThrownOutAtClose
      type: boolean
      required: true
      description: Whether users are forcefully disconnected when the hotel closes
    header: HOTEL_CLOSES_AND_OPENS_AT
  - id: 2725
    name: user.info
    realm: user-profile
    summary: Deliver the authenticated user's own identity and preference data
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server in response to `user.get_info` (c2s 357) immediately after the authentication burst. It carries the full identity record of the currently authenticated user: display name,
      figure, gender, motto, real name (if exposed), direct-mail consent, respect counters, stream publishing permission, last-access date, name-change eligibility, and safety-lock status.

      '
    receiver: 'The client stores all fields in the session state. The respect counters (`respectsRemaining`, `respectsPetRemaining`) govern how many respect actions the user may perform today. `canChangeName`
      controls visibility of the name-change flow. `safetyLocked` restricts certain actions for accounts under parental control.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: Numeric user ID
    - name: username
      type: string
      required: true
      description: Display name
    - name: figure
      type: string
      required: true
      description: Nitro figure code string
    - name: gender
      type: string
      required: true
      description: 'Gender: `M` or `F`'
    - name: motto
      type: string
      required: true
      description: User's personal motto text
    - name: realName
      type: string
      required: true
      description: Real name if the account exposes it, otherwise empty string
    - name: directMail
      type: boolean
      required: true
      description: Whether the user has consented to direct-mail communications
    - name: respectsReceived
      type: int32
      required: true
      description: Total respect points this user has received
    - name: respectsRemaining
      type: int32
      required: true
      description: Respect points the user may still give to other users today
    - name: respectsPetRemaining
      type: int32
      required: true
      description: Respect points the user may still give to pets today
    - name: streamPublishingAllowed
      type: boolean
      required: true
      description: Whether the user is permitted to publish a room stream
    - name: lastAccessDate
      type: string
      required: true
      description: ISO-style timestamp of the user's last login
    - name: canChangeName
      type: boolean
      required: true
      description: Whether the user is eligible to change their display name
    - name: safetyLocked
      type: boolean
      required: true
      description: Whether the account is under safety-lock (parental control)
    header: USER_INFO
  - id: 3898
    name: user.profile
    realm: user-profile
    summary: Deliver a user's public profile card data
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_profile` (c2s 3265) or `user.get_profile_by_name` (c2s 2249). The packet contains all fields needed to render the profile card: identity, appearance, achievement
      score, friend and online status, group memberships, and last-seen information.

      '
    receiver: 'The client renders the profile card. `isMyFriend` and `requestSent` control which action buttons are shown (add friend, cancel request, or none). `secondsSinceLastVisit` is used for the "last
      online" label; servers set this to -1 when the user has hidden their online status or is currently online. `openProfileWindow` signals whether the client should automatically display the window (true)
      or suppress it (false).

      '
    fields:
    - name: id
      type: int32
      required: true
      description: Numeric user ID
    - name: username
      type: string
      required: true
      description: Display name
    - name: figure
      type: string
      required: true
      description: Nitro figure code string
    - name: motto
      type: string
      required: true
      description: User's personal motto text
    - name: registration
      type: string
      required: true
      description: Account creation date formatted as `dd-MM-yyyy`
    - name: achievementPoints
      type: int32
      required: true
      description: Total achievement points earned
    - name: friendsCount
      type: int32
      required: true
      description: Number of confirmed friends
    - name: isMyFriend
      type: boolean
      required: true
      description: Whether the viewing user is already a friend of the target
    - name: requestSent
      type: boolean
      required: true
      description: Whether the viewing user has sent an outstanding friend request
    - name: isOnline
      type: boolean
      required: true
      description: Whether the target user is currently online
    - name: groupsCount
      type: int32
      required: true
      description: Number of group entries that follow
    notes:
    - 'After `groupsCount`, each group entry is serialized in order: `int32` groupId, `string` groupName, `string` badgeCode, `string` colorA, `string` colorB, `boolean` favourite, `int32` ownerId, `boolean`
      hasForum.

      '
    - 'After the group array: `int32` secondsSinceLastVisit (seconds since the user was last online; -1 when the user is currently online or has hidden their status), `boolean` openProfileWindow.

      '
    header: USER_PROFILE
  - id: 1087
    name: user.current_badges
    realm: inventory
    summary: Deliver the equipped badge slots for a user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_current_badges` (c2s 2091). Each entry carries the slot index and badge code for one equipped badge. Up to five badge slots may be occupied simultaneously.

      '
    receiver: 'The client stores the badge assignments and renders them on the profile card or in-room badge panel. Empty slots are not transmitted; only occupied slots appear in the list.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user whose badges are listed
    - name: count
      type: int32
      required: true
      description: Number of equipped badge entries that follow
    notes:
    - 'Each entry: `int32` slotId (1–5), `string` badgeCode.'
    header: USER_BADGES_CURRENT
  - id: 2016
    name: user.relationship_status
    realm: user-profile
    summary: Deliver a user's public relationship status entries
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_relationship_status` (c2s 2138). For each relationship type that has at least one friend assigned, the server sends the total count and one randomly selected representative
      friend (ID, name, figure).

      '
    receiver: 'The client renders the relationship section of the profile card. Each entry shows an emoji icon, the total count, and the representative friend''s avatar.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user whose relationship statuses are listed
    - name: count
      type: int32
      required: true
      description: Number of relationship entries that follow
    notes:
    - 'Each entry: `int32` relationshipType (1 = HEART, 2 = SMILE, 3 = BOBBA), `int32` friendCount (total friends with this type), `int32` randomFriendId, `string` randomFriendName, `string` randomFriendFigure.

      '
    header: MESSENGER_RELATIONSHIPS
  - id: 411
    name: user.permissions
    realm: user-profile
    summary: Deliver the authenticated user's club level and security role
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server during the post-authentication burst. The three fields encode the user''s Pixels Club tier, their moderation security level, and whether they hold the Ambassador role.

      '
    receiver: 'The client uses `clubLevel` to gate club-exclusive features (e.g. exclusive catalogue items, wardrobe slots). `securityLevel` controls access to moderation tools. `isAmbassador` unlocks the
      Ambassador helper badge and tools.

      '
    fields:
    - name: clubLevel
      type: int32
      required: true
      description: 'Pixels Club subscription tier: 0 = none, 1 = basic Club, 2 = VIP

        '
    - name: securityLevel
      type: int32
      required: true
      description: 'Moderation role level: 0 = regular user, 1 = moderator, 2 = super-moderator, 3 = administrator

        '
    - name: isAmbassador
      type: boolean
      required: true
      description: Whether the user holds the Ambassador role
    header: USER_PERMISSIONS
  - id: 2429
    name: user.figure
    realm: user-profile
    summary: Notify the client that its avatar figure has been updated
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server after a successful `user.update_figure` (c2s 2730) to confirm the accepted figure and gender back to the client. The values reflect the stored state after any server-side
      normalization.

      '
    receiver: 'The client updates its local figure state with the confirmed values and re-renders the avatar.

      '
    fields:
    - name: figure
      type: string
      required: true
      description: Confirmed Nitro figure code string
    - name: gender
      type: string
      required: true
      description: 'Confirmed gender: `M` or `F`'
    header: USER_FIGURE
  - id: 2182
    name: user.name_change
    realm: user-profile
    summary: Broadcast a user's display name change
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server to all sessions affected by a username change. The packet includes both a web-account ID (used by the external website layer) and the internal room-unit ID so clients can
      update all relevant UI elements.

      '
    receiver: 'The client updates the username in the local session data, friend list entries, and any open chat logs that reference the old name.

      '
    fields:
    - name: webId
      type: int32
      required: true
      description: External web-account identifier associated with the user
    - name: id
      type: int32
      required: true
      description: Internal user ID (room-unit ID) of the renamed user
    - name: newName
      type: string
      required: true
      description: The user's new display name
    header: UNIT_CHANGE_NAME
  - id: 513
    name: user.settings
    realm: user-profile
    summary: Deliver the authenticated user's persisted client settings
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server during the post-authentication burst to restore the user''s saved preferences. All eight fields are always present.

      '
    receiver: 'The client applies each setting to the corresponding UI control and runtime state immediately upon receipt.

      '
    fields:
    - name: volumeSystem
      type: int32
      required: true
      description: System sound volume (0–100)
    - name: volumeFurni
      type: int32
      required: true
      description: Furni sound volume (0–100)
    - name: volumeTrax
      type: int32
      required: true
      description: Music (Trax) volume (0–100)
    - name: oldChat
      type: boolean
      required: true
      description: true = legacy bubble chat style; false = modern floating chat
    - name: roomInvites
      type: boolean
      required: true
      description: Whether the user accepts room invitations from friends
    - name: cameraFollow
      type: boolean
      required: true
      description: Whether the camera follows the user's avatar
    - name: flags
      type: int32
      required: true
      description: Bitmask of miscellaneous client feature flags
    - name: chatType
      type: int32
      required: true
      description: 'Preferred chat UI style: 0 = normal, 1 = wide'
    header: USER_SETTINGS
  - id: 1255
    name: user.tags
    realm: user-profile
    summary: Deliver the profile tags of a user in a room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_tags` (c2s 17). Contains the profile tags configured by the user identified by `roomUnitId`. Tags are short freeform strings users set on their profile to describe
      themselves; the client stores them in the session data manager keyed to the room unit.

      '
    receiver: 'The client stores the tag list for the room unit and renders the tags on the in-room hover panel and profile card for that user.

      '
    fields:
    - name: roomUnitId
      type: int32
      required: true
      description: Room unit ID that identifies the user whose tags are listed
    - name: count
      type: int32
      required: true
      description: Number of tag strings that follow
    notes:
    - 'Each tag entry: `string` tag.'
    header: GET_USER_TAGS
  - id: 3475
    name: user.credits
    realm: economy-trading
    summary: Deliver the authenticated user's credit balance
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the server after login and after any transaction that changes the credit balance. The balance is encoded as a string rather than an integer to support decimal display on some hotel
      configurations.

      '
    receiver: 'The client parses the string as a decimal number and displays it in the currency HUD.

      '
    fields:
    - name: credits
      type: string
      required: true
      description: Credit balance encoded as a decimal string (e.g. `"500"`)
    header: USER_CREDITS
  - id: 2018
    name: user.currency
    realm: economy-trading
    summary: Deliver the authenticated user's activity-point currency balances
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_currency` (c2s 273) and after any transaction that changes an activity-point balance. Each entry maps a currency type ID to its current amount.

      '
    receiver: 'The client updates the currency HUD for each type received. Currency types not present in the list are left unchanged.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of currency entries that follow
    notes:
    - 'Each entry: `int32` currencyType, `int32` amount.'
    - 'Common currency types: 0 = Pixels, 5 = Diamonds. Additional types are hotel-specific.'
    header: USER_CURRENCY
  - id: 3315
    name: user.wardrobe_page
    realm: user-profile
    summary: Deliver a page of the user's saved wardrobe outfits
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to a wardrobe page request. Each entry represents one saved outfit slot with its figure code and gender. Unused slots are omitted.

      '
    receiver: 'The client populates the wardrobe editor''s slot grid. The client skips the page index field and uses only the slot entries.

      '
    fields:
    - name: pageIndex
      type: int32
      required: true
      description: Wardrobe page index (read by the client but not used for display)
    - name: count
      type: int32
      required: true
      description: Number of outfit slot entries that follow
    notes:
    - 'Each entry: `int32` slotId, `string` figure, `string` gender.'
    header: USER_OUTFITS
  - id: 954
    name: user.subscription
    realm: subscription-offers
    summary: Deliver Pixels Club subscription state
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the post-authentication burst and after a subscription purchase or renewal. The `responseType` field indicates the trigger: login refresh, new purchase, or discount offer. The optional
      `minutesSinceLastModified` field is only present when the server has additional modification timestamp data.

      '
    receiver: 'The client updates the Club badge, expiry countdown, and VIP indicators. `responseType` may trigger a purchase-success animation when set to 2.

      '
    fields:
    - name: productName
      type: string
      required: true
      description: Club product identifier, e.g. `"club_habbo"`
    - name: daysToPeriodEnd
      type: int32
      required: true
      description: Days remaining in the current subscription period
    - name: memberPeriods
      type: int32
      required: true
      description: Number of complete subscription periods the user has held
    - name: periodsSubscribedAhead
      type: int32
      required: true
      description: Number of future periods already paid for
    - name: responseType
      type: int32
      required: true
      description: 'Trigger code: 1 = login refresh, 2 = new purchase, 3 = discount available, 4 = citizenship discount

        '
    - name: hasEverBeenMember
      type: boolean
      required: true
      description: Whether the user has ever held a Club subscription
    - name: isVip
      type: boolean
      required: true
      description: Whether the user currently has a VIP subscription
    - name: pastClubDays
      type: int32
      required: true
      description: Total days the user has been a Club member historically
    - name: pastVipDays
      type: int32
      required: true
      description: Total days the user has been a VIP member historically
    - name: minutesUntilExpiration
      type: int32
      required: true
      description: Minutes until the current subscription period expires
    - name: minutesSinceLastModified
      type: int32
      required: false
      description: Minutes since the subscription record was last modified; only present when bytes remain in the payload
    header: USER_SUBSCRIPTION
  - id: 2815
    name: user.respect_received
    realm: user-profile
    summary: Notify that a user has received a respect point
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to both the giver and receiver when a respect action is completed. The packet identifies the recipient and their new total respect count.

      '
    receiver: 'The client plays the respect animation for the target user and updates the displayed respect total on the profile card if it is open.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user who received the respect point
    - name: respectsReceived
      type: int32
      required: true
      description: Updated total respect points received by this user
    header: USER_RESPECT
  - id: 126
    name: user.ignored_users
    realm: user-profile
    summary: Deliver the current session's ignore list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.get_ignored` (c2s 3878). Contains the display names of all users currently on the ignore list, optionally filtered by the prefix provided in the request.

      '
    receiver: 'The client replaces its local ignore list with the received names. Subsequent chat messages from these users are suppressed without sending further requests to the server.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of username entries that follow
    notes:
    - 'Each entry: `string` username.'
    header: USER_IGNORED
  - id: 207
    name: user.ignore_result
    realm: user-profile
    summary: Report the result of an ignore or unignore action
    since: nitro-1.6.6
    phase: session
    sender: 'Sent after any `user.ignore` (c2s 1117), `user.ignore_id` (c2s 3314), or `user.unignore` (c2s 2061) request. The result code indicates success or the reason the action was rejected.

      '
    receiver: 'The client reads the result code and either updates the local ignore list or displays an appropriate error notice.

      '
    fields:
    - name: result
      type: int32
      required: true
      description: 'Result code: 0 = ignored successfully, 1 = unignored successfully, 2 = already on ignore list, 3 = cannot ignore this user, 4 = user not found, 5 = cannot ignore yourself, 6 = ignore
        list is full

        '
    - name: name
      type: string
      required: true
      description: Display name of the user the action was attempted on
    header: USER_IGNORED_RESULT
  - id: 2867
    name: user.effect_added
    realm: inventory
    summary: Notify that a new avatar effect has been added to inventory
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user receives a new avatar effect (e.g. from a purchase or gift). The client appends the effect to the local inventory without requesting a full refresh.

      '
    receiver: 'The client adds the new effect entry to the inventory panel and may show a notification.

      '
    fields:
    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier
    - name: subType
      type: int32
      required: true
      description: Effect sub-type identifier
    - name: duration
      type: int32
      required: true
      description: Effect duration in seconds
    - name: isPermanent
      type: boolean
      required: true
      description: Whether the effect never expires
    header: USER_EFFECT_LIST_ADD
  - id: 2228
    name: user.effect_removed
    realm: inventory
    summary: Notify that an avatar effect has expired and been removed
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when an active or inventory avatar effect expires or is removed. The client removes the effect from the inventory list.

      '
    receiver: 'The client removes the effect entry matching the given type from the inventory panel.

      '
    fields:
    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier that was removed
    header: USER_EFFECT_LIST_REMOVE
  - id: 1959
    name: user.effect_activated
    realm: inventory
    summary: Confirm that an avatar effect has been activated in the room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent after the server processes `user.effect_activate` (c2s 2959). Confirms the effect is now active on the avatar and provides its remaining duration.

      '
    receiver: 'The client applies the visual effect to the user''s avatar and starts a client-side countdown timer based on `duration`.

      '
