    receiver: 'The server creates a saved-search record for the user. The updated saved-search list is delivered via `navigator.saved_searches` (s2c 3984). Confirmed in GLADIATOR.

      '
    fields:
    - name: code
      type: string
      required: true
      description: Search context code to save.
    - name: data
      type: string
      required: true
      description: Free-text filter to save alongside the code.
