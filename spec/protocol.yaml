        '
    header: NOOBNESS_LEVEL
  - id: 876
    name: user.extended_profile_changed
    realm: user-profile
    summary: Notify that another user's extended profile data has changed
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to inform the client that the extended profile data for the specified user has been updated. The client should re-fetch the profile if it is currently displayed.

      '
