  - id: 1243
    name: user.safety_lock_status
    realm: user-profile
    summary: Notify the client of an account safety-lock state change
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the safety-lock status of the account changes (e.g. a parent enables or disables parental controls). The status maps to a simple locked/unlocked enum.

      '
    receiver: 'The client updates the safety-lock state and restricts or unlocks features accordingly.

      '
