    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user collapses a search category in the navigator. The server records this preference.

      '
    receiver: 'The server marks the category identified by `code` as collapsed for the user''s navigator state. No response packet is sent. Confirmed in GLADIATOR.

      '
    fields:
    - name: code
      type: string
      required: true
      description: Search category code to mark as collapsed.
    header: NAVIGATOR_SEARCH_CLOSE
  - id: 2226
    name: navigator.search_save
    realm: navigator
    summary: Save the current search as a named bookmark
    since: nitro-1.6.6
