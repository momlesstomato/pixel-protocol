meta:
  name: Pixel Protocol
  version: 1.0.0
  status: stable
  description: Public Nitro-first packet specification for Pixels
  repository: https://github.com/ianfedev/pixel-protocol
packetComposition:
  transport: websocket
  framing:
    lengthPrefix:
      name: length
      type: uint32
      endian: big
      includesSelf: false
      includesHeader: true
      includesPayload: true
    encrypted:
      default: false
      algorithm: rc4
      activation: after diffie handshake completion
  packet:
  - name: length
    type: uint32
    endian: big
    description: Message size in bytes, excluding this 4-byte length field
  - name: messageId
    type: uint16
    endian: big
    description: Packet header identifier
  - name: payload
    type: bytes
    description: Field data serialized in declaration order
  notes:
  - The framing behaviour has been confirmed across four independent implementations (Nitro client, GLADIATOR, GALAXY, and SODIUM).
  - All implementations use big-endian primitives.
  - String values are encoded as uint16 length prefix followed by UTF-8 bytes.
  - Multiple packets can be concatenated inside a single WebSocket frame.
  - Diffie-Hellman handshake packets are always sent unencrypted; RC4 encryption may be activated after the handshake completes.
primitiveTypes:
- name: boolean
  wireType: uint8
  description: 0=false, 1=true
- name: int32
  wireType: int32
  endian: big
  description: Signed 32-bit integer
- name: uint16
  wireType: uint16
  endian: big
  description: Unsigned 16-bit integer
- name: uint32
  wireType: uint32
  endian: big
  description: Unsigned 32-bit integer
- name: bytes
  wireType: bytes
  description: Raw byte sequence
compositeTypes:
- name: string
  description: UTF-8 text with uint16 length prefix
  encoding: utf8
  lengthPrefix:
    type: uint16
    endian: big
- name: list<T>
  description: Ordered sequence with explicit count prefix
realms:
  handshake-security:
    name: Handshake & Security
    description: Encryption negotiation, machine identification, and SSO authentication
    position: 10
  session-connection:
    name: Session & Connection
    description: Keepalive, latency measurement, availability, and connection management
    position: 20
  user-profile:
    name: User & Profile
    description: User identity, appearance, permissions, settings, currency, subscriptions, wardrobe, and ignore lists
    position: 30
  messenger-social:
    name: Messenger & Social
    description: Friend list management, private messaging, room invitations, user search, and friend notifications
    position: 40
  navigator:
    name: Navigator
    description: Room discovery, search, favourites, home room, room creation, and navigator window state
    position: 50
  room:
    name: Room
    description: Room entry, model, heightmap, settings, rights, moderation, banning, doorbell, events, bots, and pet management
    position: 60
  room-entities:
    name: Room Entities
    description: Avatar movement, posture, expression, chat, hand items, typing indicators, and pet respect
    position: 70
  furniture-items:
    name: Furniture & Items
    description: Floor and wall item placement, state management, dimmer, wired logic, decorations, mannequins, and YouTube display
    position: 80
  catalog-store:
    name: Catalog & Store
    description: Store page browsing, product offers, purchases, gift wrapping, voucher redemption, and club subscriptions
    position: 90
  subscription-offers:
    name: Subscription & Offers
    description: Club subscription, targeted offers, builders club, seasonal calendars, and membership extensions
    position: 100
  economy-trading:
    name: Economy & Trading
    description: Marketplace, trading, credits, currency, and activity points
    position: 110
  inventory:
    name: Inventory
    description: Unseen items, bot/pet/furniture inventory updates, badges, effects, and clothing
    position: 120
  groups-forums:
    name: Groups & Forums
    description: Guild management, badges, member lists, group forums, and forum moderation
    position: 130
  pets:
    name: Pets
    description: Pet info, breeding, training, riding, leveling, supplements, and pet packages
    position: 140
  achievements-talents:
    name: Achievements & Talents
    description: Achievement progress, notifications, and talent track levels
    position: 150
  quests-campaigns:
    name: Quests & Campaigns
    description: Quests, seasonal quests, campaigns, competitions, and community goals
    position: 160
  games-entertainment:
    name: Games & Entertainment
    description: Game center, leaderboards, polls, voting, and quizzes
    position: 170
  moderation-safety:
    name: Moderation & Safety
    description: Mod tools, call-for-help, sanctions, guide system, and chat review
    position: 180
  camera-photos:
    name: Camera & Photos
    description: Camera snapshots, photo publishing, purchasing, and thumbnails
    position: 190
  notifications-landing:
    name: Notifications & Landing
    description: Desktop view, news, promotions, alerts, welcome gifts, and new-user experience
    position: 200
  crafting-recycling:
    name: Crafting & Recycling
    description: Ecotron recycling, crafting recipes, and crafting composting
    position: 210
  other:
    name: Other
    description: Mystery box, fireworks, rentable extensions, phone verification, and miscellaneous packets
    position: 220
packets:
  c2s:
  - id: 4000
    name: handshake.release_version
    realm: handshake-security
    summary: Advertise Nitro release and client platform metadata
    since: nitro-1.6.6
    phase: pre-auth
    sender: 'The client sends this packet immediately after the WebSocket connection opens, before any other message. It advertises the client build string (e.g. `NITRO-1-6-6`), the runtime type (`HTML5`),
      and numeric platform and device-category identifiers. This allows the server to gate features or reject incompatible client versions.

      '
    receiver: 'The server may read the release string and compare it against a list of supported revisions. If the version is unrecognized the server may disconnect the client. In many implementations the
      payload is read and silently discarded. No response packet is required.

      '
    fields:
    - name: releaseVersion
      type: string
      required: true
      description: Nitro release string, e.g. `NITRO-1-6-6`
    - name: clientType
      type: string
      required: true
      description: Client runtime marker, e.g. `HTML5`
    - name: platform
      type: int32
      required: true
      description: 'Client platform enum: 0 = unknown, 1 = Flash, 2 = HTML5'
    - name: deviceCategory
      type: int32
      required: true
      description: 'Client device category enum: 0 = unknown, 1 = browser'
    header: RELEASE_VERSION
  - id: 1053
    name: handshake.client_variables
    realm: handshake-security
    summary: Send client resource metadata required by some server revisions
    since: nitro-1.6.6
    phase: pre-auth
    sender: 'Sent during the pre-authentication phase. The client provides its numeric client ID (usually `0`), the main client URL, and the external variables URL. These allow the server to verify that
      the connecting client points at the intended backend resources.

      '
    receiver: 'The server reads the three fields. Most implementations discard the values without validation. No response packet is sent.

      '
    fields:
    - name: clientId
      type: int32
      required: true
      description: Numeric client id, often 0
    - name: clientUrl
      type: string
      required: true
      description: Main Nitro client URL
    - name: externalVariablesUrl
      type: string
      required: true
      description: External variables URL
    header: CLIENT_VARIABLES
  - id: 3110
    name: handshake.init_diffie
    realm: handshake-security
    summary: Request signed Diffie-Hellman parameters from server
    since: nitro-1.6.6
    phase: crypto
    sender: 'The client sends this empty packet to request the Diffie-Hellman prime and generator values from the server. It is the first step of the optional encryption handshake and must be sent before
      `handshake.complete_diffie`. Some Nitro builds skip this step entirely and authenticate without encryption.

      '
    receiver: 'The server verifies that an encryption module is initialized for this session. If encryption is not available the server disconnects the client. Otherwise it responds with the server-bound
      `handshake.init_diffie` (s2c 1347) containing the RSA-signed prime and generator.

      '
    fields: []
    header: HANDSHAKE_INIT_DIFFIE
  - id: 773
    name: handshake.complete_diffie
    realm: handshake-security
    summary: Send client public key and complete key exchange
    since: nitro-1.6.6
    phase: crypto
    sender: 'After receiving the signed prime and generator (s2c 1347), the client decrypts them with the known RSA public key, generates its own Diffie-Hellman key pair, and sends its public key to the
      server. This is the second and final step of the encryption handshake.

      '
    receiver: 'The server decrypts the client public key with RSA and computes the shared secret (`clientPublic ^ serverPrivate mod prime`). It then responds with `handshake.complete_diffie` (s2c 3885)
      containing its own public key, and installs RC4 encryption on both the inbound and outbound channels. All subsequent traffic is encrypted. The server sets a `handshakeFinished` flag on the session;
      if a later `security.sso_ticket` arrives and this flag is false while encryption is enforced, the server disconnects the client.

      '
    fields:
    - name: encryptedPublicKey
      type: string
      required: true
      description: RSA-encrypted client-side Diffie-Hellman public key
    header: HANDSHAKE_COMPLETE_DIFFIE
  - id: 2490
    name: security.machine_id
    realm: handshake-security
    summary: Send machine and fingerprint identifiers
    since: nitro-1.6.6
    phase: pre-auth
    sender: 'The client sends a stable machine identifier, a browser fingerprint hash, and a capabilities string. The machine ID is typically a 64-character hex string persisted in local storage. This packet
      can be sent before or after authentication, depending on the client build.

      '
    receiver: 'The server reads the three strings and stores the machine ID on the session. If the machine ID is malformed (e.g. starts with `~` or is not exactly 64 characters) the server generates a new
      random 64-character hex ID and echoes it back via `security.machine_id` (s2c 1488). The server also checks the machine ID against a machine-ban list and disconnects the client if banned. The fingerprint
      and capabilities strings are read but typically discarded.

      '
    fields:
    - name: machineId
      type: string
      required: true
      description: Stable 64-character hex machine identifier
    - name: fingerprint
      type: string
      required: true
      description: Client fingerprint hash
    - name: capabilities
      type: string
      required: true
      description: Capability or version signature string
    header: SECURITY_MACHINE
  - id: 2419
    name: security.sso_ticket
    realm: handshake-security
    summary: Authenticate using the SSO ticket
    since: nitro-1.6.6
    phase: auth
    sender: 'The client sends the single-sign-on token obtained from an external authentication service, along with an optional client-side timestamp. This packet is sent after the release version and optionally
      after the Diffie-Hellman handshake. It is the primary authentication mechanism.

      '
    receiver: 'The server strips whitespace from the ticket, validates that it is non-empty, and looks it up in the user database. If the ticket is invalid, not found, or associated with a banned account,
      the server disconnects the client. On success the server invalidates the ticket (making it single-use), loads the user session, and sends a burst of post-authentication packets beginning with `authentication.ok`
      (s2c 2491) followed by `availability.status` (s2c 2033) and the first `client.ping` (s2c 3928) to start the keepalive cycle. If encryption is enforced and the Diffie-Hellman handshake was not completed,
      the server rejects the login.

      '
    fields:
    - name: ticket
      type: string
      required: true
      description: SSO token issued by auth service
    - name: timestamp
      type: int32
      required: false
      description: Optional client-side timestamp (ticker time)
    header: SECURITY_TICKET
  - id: 295
    name: client.latency_test
    realm: session-connection
    summary: Send latency probe id to measure round-trip time
    since: nitro-1.6.6
    phase: session
    sender: 'The client generates an integer request ID and sends it to the server to initiate a round-trip latency measurement. The client records the send timestamp locally and computes RTT when the echo
      arrives.

      '
    receiver: 'The server reads the integer request ID and immediately echoes it back in a `client.latency_response` (s2c 10) packet. No validation or state change is involved.

      '
    fields:
    - name: requestId
      type: int32
      required: true
      description: Client-generated probe identifier
    header: CLIENT_LATENCY
  - id: 2596
    name: client.pong
    realm: session-connection
    summary: Keepalive response to server ping
    since: nitro-1.6.6
    phase: session
    sender: 'The client sends this empty packet in response to every `client.ping` (s2c 3928) received from the server. The Nitro client also supports a manual pong mode where pongs are sent on a fixed
      interval (configurable, default 20 000 ms) independent of incoming pings.

      '
    receiver: 'The server uses the arrival of this packet to reset the pong timeout timer. If no pong is received within the configured timeout (typically 60 seconds) the server assumes the client is unresponsive
      and closes the connection. The packet body is ignored; only its arrival matters.

      '
    fields: []
    header: CLIENT_PONG
  - id: 2445
    name: client.disconnect
    realm: session-connection
    summary: Client-initiated graceful disconnect
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client when the user explicitly logs out or navigates away. This notifies the server of an intentional disconnect so it can clean up the session immediately rather than waiting
      for a timeout.

      '
    receiver: 'The server terminates the session, removes the user from all rooms, persists any unsaved state (currency, inventory), and closes the underlying connection.

      '
    fields: []
    header: DISCONNECT
  - id: 357
    name: user.get_info
    realm: user-profile
    summary: Request own user data from the server
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client immediately after receiving `authentication.ok` (s2c 2491) to request its own user data. The packet carries no payload; the server identifies the requesting user from the
      session.

      '
    receiver: 'The server responds with `user.info` (s2c 2725) containing the authenticated user''s full identity and preference data, followed by `user.permissions` (s2c 411) and `user.subscription` (s2c
      954).

      '
    fields: []
    header: USER_INFO
  - id: 3265
    name: user.get_profile
    realm: user-profile
    summary: Request the public profile of a user by ID
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the client wants to display another user''s public profile card. The `userId` identifies the target; `openProfile` signals whether the client intends to open the profile window (true)
      or is fetching data silently (false).

      '
    receiver: 'The server looks up the target user (online or offline) and responds with `user.profile` (s2c 3898). If the user does not exist the server may send no response or an error packet.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user whose profile is requested
    - name: openProfile
      type: boolean
      required: true
      description: Whether the client intends to open the profile window
    header: USER_PROFILE
  - id: 2249
    name: user.get_profile_by_name
    realm: user-profile
    summary: Request the public profile of a user by username
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the client wants to look up a profile by display name rather than by numeric ID, for example from a search result or a chat name-click flow.

      '
    receiver: 'The server resolves the username to a user ID, then responds with `user.profile` (s2c 3898). If the username is not found the server may send no response or a generic error.

      '
    fields:
    - name: username
      type: string
      required: true
      description: Display name of the user whose profile is requested
    header: USER_PROFILE_BY_NAME
  - id: 2091
    name: user.get_current_badges
    realm: inventory
    summary: Request the equipped badges of a user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to fetch the badge slots currently equipped by the target user. Used when rendering profile cards or in-room badge displays.

      '
    receiver: 'The server responds with `user.current_badges` (s2c 1087) containing the equipped badge codes and their slot assignments.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user whose equipped badges are requested
    header: USER_BADGES_CURRENT
  - id: 2138
    name: user.get_relationship_status
    realm: user-profile
    summary: Request the public relationship status entries for a user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to retrieve the relationship status counts (heart / smile / bobba) that a target user has assigned to their friends, along with one random representative friend per status type.

      '
    receiver: 'The server responds with `user.relationship_status` (s2c 2016). If the target user has no relationships the server sends the packet with a count of zero.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user whose relationship statuses are requested
    header: MESSENGER_RELATIONSHIPS
  - id: 3768
    name: user.set_relationship_status
    realm: user-profile
    summary: Set or clear the relationship status toward a friend
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user assigns or removes a relationship emoji on a friend. The relationship type maps to a well-known enum value. Setting the type to 0 (NONE) clears any existing relationship.

      '
    receiver: 'The server stores the new relationship type for the pair. No explicit response packet is sent; the friend list update reflects the change asynchronously.

      '
    fields:
    - name: friendId
      type: int32
      required: true
      description: ID of the friend whose relationship status is being set
    - name: relationshipType
      type: int32
      required: true
      description: 'Relationship type enum: 0 = NONE (clear), 1 = HEART, 2 = SMILE, 3 = BOBBA

        '
    header: SET_RELATIONSHIP_STATUS
  - id: 17
    name: user.get_tags
    realm: user-profile
    summary: Request the profile tags of a user currently in a room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to fetch the profile tags of a user occupying a room unit. Tags are short freeform strings (e.g. "music", "gaming") that users configure on their profile to describe themselves; they are
      displayed on the in-room hover panel and profile card. The request identifies the target by room unit ID because the user may not be known by their user ID at the point the client triggers this call.

      '
    receiver: 'The server looks up the profile tags for the user occupying the given room unit and responds with `user.tags` (s2c 1255).

      '
    fields:
    - name: roomUnitId
      type: int32
      required: true
      description: Room unit ID that identifies the target user within the room
    header: USER_TAGS
  - id: 2730
    name: user.update_figure
    realm: user-profile
    summary: Update the authenticated user's avatar figure and gender
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client when the user applies a new look from the wardrobe editor. The gender string must be uppercase (`M` or `F`). The figure string is the full Nitro figure code.

      '
    receiver: 'The server validates the figure string against the owned wardrobe parts (if enforcement is enabled) and updates the user''s look in the database. It then broadcasts a figure update to any
      room the user is currently in and may send a confirmation via `user.figure` (s2c 2429).

      '
    fields:
    - name: gender
      type: string
      required: true
      description: 'Gender code: `M` for male, `F` for female'
    - name: figure
      type: string
      required: true
      description: Full Nitro figure code string
    header: USER_FIGURE
  - id: 2228
    name: user.update_motto
    realm: user-profile
    summary: Update the authenticated user's motto
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user saves a new motto from their profile editor. The server may enforce a maximum length or filter forbidden words.

      '
    receiver: 'The server updates the motto in the database and broadcasts the change to any room the user is currently in. No explicit confirmation packet is sent.

      '
    fields:
    - name: motto
      type: string
      required: true
      description: New motto text
    header: USER_MOTTO
  - id: 2694
    name: user.respect
    realm: user-profile
    summary: Send a respect point to another user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user clicks the respect button on another user''s profile. Each session has a limited number of respect points to give per day; the server tracks this counter.

      '
    receiver: 'The server decrements the sender''s remaining daily respect counter, increments the target''s total respects received, and broadcasts `user.respect_received` (s2c 2815) to both parties. If
      the sender has no remaining respect points the server silently ignores the request.

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user receiving the respect point
    header: USER_RESPECT
  - id: 3878
    name: user.get_ignored
    realm: user-profile
    summary: Fetch the ignored-users list filtered by username prefix
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to retrieve the current session''s ignore list. The username field acts as a search filter; passing an empty string returns the full list.

      '
    receiver: 'The server responds with `user.ignored_users` (s2c 126) containing all matching usernames currently on the ignore list.

      '
    fields:
    - name: username
      type: string
      required: true
      description: Username prefix to filter results; empty string returns all
    header: USER_IGNORED
  - id: 1117
    name: user.ignore
    realm: user-profile
    summary: Add a user to the ignore list by username
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user mutes or ignores another user by display name. Once ignored, chat messages and whispers from that user will be suppressed on the client.

      '
    receiver: 'The server adds the target username to the session''s ignore list and responds with `user.ignore_result` (s2c 207) indicating success or the reason for failure (not found, already ignored,
      etc.).

      '
    fields:
    - name: username
      type: string
      required: true
      description: Display name of the user to ignore
    header: USER_IGNORE
  - id: 3314
    name: user.ignore_id
    realm: user-profile
    summary: Add a user to the ignore list by user ID
    since: nitro-1.6.6
    phase: session
    sender: 'Functionally equivalent to `user.ignore` (c2s 1117) but identifies the target by numeric ID rather than username, which is more reliable for users with recently changed names.

      '
    receiver: 'The server resolves the ID to a username, adds the entry to the ignore list, and responds with `user.ignore_result` (s2c 207).

      '
    fields:
    - name: userId
      type: int32
      required: true
      description: ID of the user to add to the ignore list
    header: USER_IGNORE_ID
  - id: 2061
    name: user.unignore
    realm: user-profile
    summary: Remove a user from the ignore list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user un-mutes a previously ignored user. After removal, chat messages from the target are no longer suppressed.

      '
    receiver: 'The server removes the entry from the ignore list and responds with `user.ignore_result` (s2c 207) with a result code indicating the entry was removed.

      '
    fields:
    - name: username
      type: string
      required: true
      description: Display name of the user to remove from the ignore list
    header: USER_UNIGNORE
  - id: 273
    name: user.get_currency
    realm: economy-trading
    summary: Request the current activity-point currency balances
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client to refresh its local copy of the user''s activity-point currency balances (seasonal currencies, pixels, etc.). The packet carries no payload.

      '
    receiver: 'The server responds with `user.currency` (s2c 2018) containing all currency type/amount pairs for the authenticated user.

      '
    fields: []
    header: USER_CURRENCY
  - id: 1367
    name: user.settings_volume
    realm: user-profile
    summary: Save audio volume preferences
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user changes audio volume levels in the settings panel. All three volume values are sent together even if only one changed.

      '
    receiver: 'The server persists the three volume values and updates the session settings. No response packet is sent.

      '
    fields:
    - name: volumeSystem
      type: int32
      required: true
      description: System sound volume (0–100)
    - name: volumeFurni
      type: int32
      required: true
      description: Furni sound volume (0–100)
    - name: volumeTrax
      type: int32
      required: true
      description: Music (Trax) volume (0–100)
    header: USER_SETTINGS_VOLUME
  - id: 1262
    name: user.settings_old_chat
    realm: user-profile
    summary: Toggle old-style chat bubble mode
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user toggles between the modern floating chat style and the legacy bubble chat style.

      '
    receiver: 'The server persists the preference and may forward the flag to other users in the same room to adjust their rendering of this user''s chat messages. No response packet is sent.

      '
    fields:
    - name: oldChat
      type: boolean
      required: true
      description: true = legacy bubble chat; false = modern floating chat
    header: USER_SETTINGS_OLD_CHAT
  - id: 1086
    name: user.settings_room_invites
    realm: user-profile
    summary: Toggle room invitation acceptance
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user enables or disables the ability to receive room invitations from friends.

      '
    receiver: 'The server persists the preference. When a friend sends a room invite and this flag is false the server suppresses delivery. No response packet is sent.

      '
    fields:
    - name: roomInvites
      type: boolean
      required: true
      description: true = accept room invites; false = block room invites
    header: USER_SETTINGS_INVITES
  - id: 1461
    name: user.settings_camera
    realm: camera-photos
    summary: Toggle camera-follow-avatar mode
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user enables or disables the camera-follow feature, which keeps the viewport centered on their avatar while walking.

      '
    receiver: 'The server persists the preference. No response packet is sent.

      '
    fields:
    - name: cameraFollow
      type: boolean
      required: true
      description: true = camera follows avatar; false = free camera
    header: USER_SETTINGS_CAMERA
  - id: 2959
    name: user.effect_activate
    realm: inventory
    summary: Activate an avatar effect in the inventory
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user activates an avatar effect from the inventory panel. The server applies the effect to the user''s avatar in the current room and starts the duration timer.

      '
    receiver: 'The server marks the effect as active for the session and broadcasts the activation to the room via `user.effect_activated` (s2c 1959). If the effect is already active it may be extended
      or reset depending on the server implementation.

      '
    fields:
    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier
    header: USER_EFFECT_ACTIVATE
  - id: 1752
    name: user.effect_enable
    realm: user-profile
    summary: Select or highlight an avatar effect in the inventory
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user selects (enables) an avatar effect in the inventory list without necessarily activating it in a room. The server records the selection so it can be applied on the next room
      entry.

      '
    receiver: 'The server persists the selected effect. The client receives `user.effect_selected` (s2c 3473) confirming the selection.

      '
    fields:
    - name: type
      type: int32
      required: true
      description: Avatar effect type identifier to select
    header: USER_EFFECT_ENABLE
  - id: 2769
    name: user.get_badges
    realm: inventory
    summary: Request the full badge inventory for the authenticated user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client to load the complete badge inventory, including all earned badges and the current equipped-badge slot assignments. Carries no payload.

      '
    receiver: 'The server responds with `user.badges` (s2c 717) containing the full badge inventory and current slot assignments.

      '
    fields: []
    header: USER_BADGES
  - id: 644
    name: user.update_badges
    realm: inventory
    summary: Save the current badge slot assignments
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user saves their badge display configuration. The payload encodes each occupied slot as a sequential pair of slot index and badge code. Empty slots are omitted.

      '
    receiver: 'The server updates the user''s badge slot assignments in the database and broadcasts the change to relevant rooms.

      '
    fields: []
    notes:
    - 'Payload is a flat list of pairs (no count prefix): `int32` slotIndex (1–5), `string` badgeCode — one pair per occupied slot, in slot order.

      '
    header: USER_BADGES_CURRENT_UPDATE
  - id: 2742
    name: user.get_wardrobe
    realm: user-profile
    summary: Request a page of saved wardrobe outfits
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to load a specific page of the user''s wardrobe slots. Page numbering starts at 0. Most implementations use a single page (0) for the entire wardrobe.

      '
    receiver: 'The server responds with `user.wardrobe_page` (s2c 3315) containing the outfit slots for the requested page.

      '
    fields:
    - name: pageId
      type: int32
      required: true
      description: Zero-based wardrobe page index to retrieve
    header: GET_WARDROBE
  - id: 800
    name: user.save_wardrobe_outfit
    realm: user-profile
    summary: Save an outfit to a wardrobe slot
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user saves the current avatar look into a specific wardrobe slot. The server overwrites any existing outfit in that slot.

      '
    receiver: 'The server persists the outfit data for the slot. No explicit response packet is sent; the client updates its local wardrobe model optimistically.

      '
    fields:
    - name: slotId
      type: int32
      required: true
      description: Wardrobe slot index (1-based) to save the outfit into
    - name: look
      type: string
      required: true
      description: Full Nitro figure code string for the outfit
    - name: gender
      type: string
      required: true
      description: 'Gender code: `M` for male, `F` for female'
    header: SAVE_WARDROBE_OUTFIT
  - id: 2977
    name: user.change_name
    realm: user-profile
    summary: Submit a new display name for the authenticated user
    since: nitro-1.6.6
    phase: session
    sender: 'Sent after the user confirms a new username in the name-change flow. The server validates and applies the new name if eligible. `canChangeName` in `user.info` (s2c 2725) must be true before
      this packet is sent.

      '
    receiver: 'The server validates the name (length, allowed characters, and uniqueness), persists it on success, and responds with `user.change_name_result` (s2c 118). It also broadcasts `user.name_change`
      (s2c 2182) to affected sessions.

      '
    fields:
    - name: name
      type: string
      required: true
      description: Desired new display name
    header: CHANGE_USERNAME
  - id: 3950
    name: user.check_name
    realm: user-profile
    summary: Validate a candidate display name before committing
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to check whether a proposed username is valid and available before the user confirms. Used for live validation feedback in the name-change UI.

      '
    receiver: 'The server validates the name and responds with `user.check_name_result` (s2c 563) containing the validation result code and optional alternative suggestions.

      '
    fields:
    - name: name
      type: string
      required: true
      description: Candidate display name to validate
    header: CHECK_USERNAME
  - id: 2109
    name: user.approve_name
    realm: user-profile
    summary: Submit a name string for server-side word screening
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the client needs the server to screen a name string against forbidden-word filters before it is persisted. The `type` value is a server-defined integer that scopes the validation
      to the appropriate naming rules for that context.

      '
    receiver: 'The server runs the name through its word filter and naming rules for the given type, then responds with `user.approve_name_result` (s2c 1503) containing the result code and any validation
      detail string.

      '
    fields:
    - name: name
      type: string
      required: true
      description: Name string to screen
    - name: type
      type: int32
      required: true
      description: Server-defined integer that identifies the naming context (values are server-specific)
    header: APPROVE_NAME
  - id: 749
    name: user.pet_supplement
    realm: pets
    summary: Give a supplement item to a pet
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user gives a supplement (food, treat, etc.) to a pet in the room. The supplement type determines the in-game effect on the pet''s stats.

      '
    receiver: 'The server applies the supplement effect to the pet and broadcasts `user.pet_supplemented` (s2c 3441) to the room.

      '
    fields:
    - name: petId
      type: int32
      required: true
      description: ID of the pet receiving the supplement
    - name: supplement
      type: int32
      required: true
      description: Supplement type identifier
    header: PET_SUPPLEMENT
  - id: 869
    name: user.get_kickback_info
    realm: subscription-offers
    summary: Request Habbo Club kickback (reward) information
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to retrieve the user''s Habbo Club credit kickback data, including streak information, percentages, and upcoming payday details. Carries no payload.

      '
    receiver: 'The server responds with `user.kickback_info` (s2c 3277).

      '
    fields: []
    header: SCR_GET_KICKBACK_INFO
  - id: 3166
    name: user.get_subscription
    realm: subscription-offers
    summary: Request subscription status for a named product
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to request the subscription status for a specific club product by name (e.g. `"club_habbo"`). This allows targeted refresh of a single product''s subscription state.

      '
    receiver: 'The server responds with `user.subscription` (s2c 954) scoped to the requested product name.

      '
    fields:
    - name: type
      type: string
      required: true
      description: Club product identifier, e.g. `"club_habbo"`
    header: USER_SUBSCRIPTION
  - id: 1740
    name: user.set_home_room
    realm: user-profile
    summary: Set the user's home room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user designates a room as their home room from the room navigator or room settings. Passing `0` as roomId clears the current home room.

      '
    receiver: 'The server persists the home room preference. The client will be sent to this room automatically on login if configured. No response packet is sent.

      '
    fields:
    - name: roomId
      type: int32
      required: true
      description: ID of the room to set as home room; 0 to clear
    header: USER_HOME_ROOM
  - id: 3493
    name: user.unseen_reset_category
    realm: inventory
    summary: Mark all unseen items in a category as seen
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to acknowledge and clear the unseen notification badge for an entire inventory category at once. All items in the category are marked as seen without listing individual IDs.

      '
    receiver: 'The server clears the unseen flags for all items in the specified category. No response packet is sent.

      '
    fields:
    - name: category
      type: int32
      required: true
      description: 'Integer identifying the inventory category to reset. Values are server-defined; see `user.unseen_items` (s2c 2103) for the categories the server uses.

        '
    header: UNSEEN_RESET_CATEGORY
  - id: 2343
    name: user.unseen_reset_items
    realm: inventory
    summary: Mark specific unseen items as seen
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to acknowledge individual items within a category as seen, rather than clearing the entire category at once.

      '
    receiver: 'The server clears the unseen flag for each listed item. No response packet is sent.

      '
    fields:
    - name: category
      type: int32
      required: true
      description: Inventory category the items belong to
    - name: count
      type: int32
      required: true
      description: Number of item ID values that follow
    notes:
    - After `count`, each entry is a single `int32` itemId.
    header: UNSEEN_RESET_ITEMS
  - id: 2557
    name: user.get_email_status
    realm: user-profile
    summary: Request the account email address and verification status
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to fetch the current email address on file, whether it has been verified, and whether the user is allowed to change it. Carries no payload.

      '
    receiver: 'The server responds with `user.email_status` (s2c 612).

      '
    fields: []
    header: EMAIL_GET_STATUS
  - id: 3965
    name: user.change_email
    realm: user-profile
    summary: Submit a new email address for the account
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user submits a new email address from the account settings panel.

      '
    receiver: 'The server validates the address format and uniqueness, then responds with `user.change_email_result` (s2c 1815) indicating whether the change was accepted.

      '
    fields:
    - name: newEmail
      type: string
      required: true
      description: New email address to associate with the account
    header: EMAIL_CHANGE
  - id: 66
    name: user.welcome_gift_change_email
    realm: user-profile
    summary: Submit an email address update as part of the welcome-gift flow
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the new-user welcome-gift flow when the user provides or updates their email address to unlock gift eligibility.

      '
    receiver: 'The server records the address and responds with `user.welcome_gift_change_email_result` (s2c 2293).

      '
    fields:
    - name: newEmail
      type: string
      required: true
      description: Email address to associate with the welcome-gift eligibility
    header: WELCOME_GIFT_CHANGE_EMAIL
  - id: 21
    name: user.get_group_badges
    realm: inventory
    summary: Request badge codes for groups the user has joined
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to retrieve the badge codes for all Habbo groups the authenticated user is a member of. Carries no payload.

      '
    receiver: 'The server responds with `user.group_badges` (s2c 2402) containing each group ID and its badge code.

      '
    fields: []
    header: GROUP_BADGES
  - id: 367
    name: user.get_group_memberships
    realm: inventory
    summary: Request the full list of groups the user belongs to
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to retrieve the user''s complete group membership list, including full group entry data for each group. Carries no payload.

      '
    receiver: 'The server responds with `user.guild_memberships` (s2c 420) containing all group entries.

      '
    fields: []
    header: GROUP_MEMBERSHIPS
  - id: 1371
    name: user.get_badge_point_limits
    realm: achievements-talents
    summary: Request the point limits for badge achievement levels
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to fetch the point thresholds for each level of every badge achievement. Carries no payload.

      '
    receiver: 'The server responds with `user.badge_point_limits` (s2c 2501).

      '
    fields: []
    header: GET_BADGE_POINTS_LIMITS
  - id: 3077
    name: user.request_badge
    realm: achievements-talents
    summary: Request a specific promotional or achievement badge
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to claim a badge by its promotional request code. Used for limited-time badge campaigns where users submit a code to receive a badge.

      '
    receiver: 'The server validates the request code and responds with `user.badge_request_fulfilled` (s2c 2998) indicating whether the badge was granted.

      '
    fields:
    - name: requestCode
      type: string
      required: true
      description: Promotional badge request code
    header: REQUESTABADGE
  - id: 1364
    name: user.check_badge_request
    realm: achievements-talents
    summary: Check whether a badge request code has been fulfilled
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to query the fulfillment status of a previously submitted badge request code without re-requesting the badge.

      '
    receiver: 'The server responds with `user.badge_request_fulfilled` (s2c 2998) indicating current fulfillment state.

      '
    fields:
    - name: requestCode
      type: string
      required: true
      description: Badge request code to check fulfillment status for
    header: GETISBADGEREQUESTFULFILLED
  - id: 1299
    name: user.nux_proceed
    realm: user-profile
    summary: Signal completion of the current new-user experience step
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to the server to confirm that the client has finished processing the current step of the new-user experience (NUX) onboarding sequence. Carries no payload. The server drives the NUX sequence;
      the client sends this packet to acknowledge each step before the server advances to the next one.

      '
    receiver: 'The server records that the current NUX step is complete for the session and continues the NUX script sequence.

      '
    fields: []
    header: NEW_USER_EXPERIENCE_SCRIPT_PROCEED
  - id: 1822
    name: user.nux_get_gifts
    realm: user-profile
    summary: Submit gift selections during the new-user experience
    since: nitro-1.6.6
    phase: session
    sender: 'Sent during the NUX gift-selection step. The user picks one gift per NUX day/step combination; each selection is encoded as a triple of day index, step index, and gift index.

      '
    receiver: 'The server records the gift selections and delivers the corresponding items to the user''s inventory.

      '
    fields:
    - name: selectionCount
      type: int32
      required: true
      description: Total number of integer values that follow (selections × 3)
    notes:
    - 'After `selectionCount`, each gift selection is three `int32` values: `dayIndex`, `stepIndex`, `giftIndex`.

      '
    header: NEW_USER_EXPERIENCE_GET_GIFTS
  - id: 2285
    name: user.set_classification
    realm: user-profile
    summary: Declare the user class type for the current session
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client to register its user class type string with the server. The string value is server-defined and corresponds to the classification categories the server sends back in `user.classification`
      (s2c 966).

      '
    receiver: 'The server records the class type for the session. It uses this when populating `user.classification` (s2c 966) responses that map user IDs to their names and class types.

      '
    fields:
    - name: userClassType
      type: string
      required: true
      description: Server-defined string identifying the user's class type
    header: USER_CLASSIFICATION
  - id: 2781
    name: messenger.init
    realm: messenger-social
    summary: Initialize the friend list and messenger subsystem
    since: nitro-1.6.6
    phase: session
    sender: 'Sent by the client immediately after receiving `user.info` (s2c 2725) to request the messenger configuration. Carries no payload. The server responds with `messenger.init` (s2c 1605) which
      delivers the friend limit values and category list.

      '
    receiver: 'The server looks up the user''s messenger limits and custom friend categories, then sends `messenger.init` (s2c 1605). Confirmed in GLADIATOR and GALAXY.

      '
    fields: []
    header: MESSENGER_INIT
  - id: 3567
    name: messenger.chat
    realm: messenger-social
    summary: Send a private message to a friend
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user submits text in a private-message conversation window. The recipient must be on the sender''s friend list.

      '
    receiver: 'The server validates that the two users are friends and that neither has blocked the other. It persists the message and delivers `messenger.chat` (s2c 1587) to the recipient''s active session.
      If delivery fails, it responds with `messenger.message_error` (s2c 892). Confirmed in GLADIATOR and GALAXY.

      '
    fields:
    - name: recipientId
      type: int32
      required: true
      description: 'User ID of the friend to whom the message is addressed.

        '
    - name: message
      type: string
      required: true
      description: UTF-8 text body of the private message.
    header: MESSENGER_CHAT
  - id: 3157
    name: messenger.request_friend
    realm: messenger-social
    summary: Send a friend request to another user by username
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user submits a friend request from the search panel or another UI entry point. The target is identified by username rather than user ID.

      '
    receiver: 'The server resolves the username to a user ID and validates eligibility (block settings, friend list capacity). If the target accepts incoming requests, the server creates a pending friend
      request and delivers `messenger.friend_request` (s2c 2219) to the target''s active session. If the request cannot be sent, the server responds with `messenger.message_error` (s2c 892). Confirmed in
      GLADIATOR.

      '
    fields:
    - name: username
      type: string
      required: true
      description: Display name of the user to invite.
    header: REQUEST_FRIEND
  - id: 137
    name: messenger.accept_friend
    realm: messenger-social
    summary: Accept one or more pending friend requests
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user approves one or more entries in the pending friend request list. Multiple requests can be accepted in a single packet.

      '
    receiver: 'The server processes each user ID in order. For each, it verifies the request exists, that both friend lists have capacity, and then creates the bidirectional friendship record. If the sender''s
      own friend list is full, the server stops processing and responds with `messenger.accept_result` (s2c 896) containing the failure details. Confirmed in GLADIATOR.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of user IDs that follow.
    notes:
    - After `count`, each entry is a single `int32` user ID of the requester to accept.
    header: ACCEPT_FRIEND
  - id: 2890
    name: messenger.decline_friend
    realm: messenger-social
    summary: Decline one or more pending friend requests, or clear all
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user dismisses pending friend requests. When `removeAll` is true the entire pending list is cleared and no user IDs need to follow. When false, only the listed users are declined.

      '
    receiver: 'The server deletes the specified pending request records. No confirmation packet is sent. Confirmed in GLADIATOR.

      '
    fields:
    - name: removeAll
      type: boolean
      required: true
      description: 'When true, all pending friend requests are cleared and the remainder of the payload is ignored.

        '
    - name: count
      type: int32
      required: true
      description: 'Number of user IDs that follow. Ignored when `removeAll` is true.

        '
    notes:
    - After `count`, each entry is a single `int32` user ID of the requester to decline.
    header: DECLINE_FRIEND
  - id: 1689
    name: messenger.remove_friend
    realm: messenger-social
    summary: Remove one or more users from the friend list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user removes friends from the friend list UI. Multiple removals can be batched in one packet.

      '
    receiver: 'The server deletes the bidirectional friendship record for each listed user ID. For each target who is currently online, the server sends them `messenger.update` (s2c 2800) with a removal
      entry for the local user''s ID. The server then sends the local user `messenger.update` (s2c 2800) confirming all removals. Confirmed in GLADIATOR.

      '
    fields:
    - name: count
      type: int32
      required: true
      description: Number of user IDs that follow.
    notes:
    - After `count`, each entry is a single `int32` user ID of the friend to remove.
    header: REMOVE_FRIEND
  - id: 3997
    name: messenger.follow_friend
    realm: messenger-social
    summary: Follow a friend to their current room
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user clicks "Follow" on a friend who is currently in a room. The friend must be online and their `followingAllowed` flag must be set in the friend list entry.

      '
    receiver: 'The server looks up the target friend''s current room and, if the user is permitted to enter, forwards the client to that room via `room.forward` (s2c 160). If the follow cannot be completed,
      the server responds with `messenger.follow_failed` (s2c 3048). Confirmed in GLADIATOR.

      '
    fields:
    - name: friendId
      type: int32
      required: true
      description: User ID of the online friend to follow.
    header: FOLLOW_FRIEND
  - id: 1210
    name: messenger.search
    realm: messenger-social
    summary: Search for users by name fragment
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user types in the friend-search box. The server returns up to two result groups: friends matching the query and non-friends matching the query.

      '
    receiver: 'The server searches for usernames containing the query string and responds with `messenger.search_result` (s2c 973). Confirmed in GLADIATOR.

      '
    fields:
    - name: query
      type: string
      required: true
      description: 'Username substring to search for. Must be at least one character.

        '
    header: HABBO_SEARCH
  - id: 1276
    name: messenger.room_invite
    realm: messenger-social
    summary: Send a room invitation to one or more friends
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user invites friends to the room they are currently in. The invitation includes a text message and a list of recipient user IDs.

      '
    receiver: 'The server delivers `messenger.room_invite` (s2c 3870) to each recipient''s active session. Recipients who cannot be reached are reported back via `messenger.room_invite_error` (s2c 462).
      Confirmed in GLADIATOR.

      '
    fields:
    - name: recipientCount
      type: int32
      required: true
      description: Number of recipient user IDs that follow.
    - name: message
      type: string
      required: true
      description: 'Invitation text displayed to recipients alongside the room link.

        '
    notes:
    - After `recipientCount`, each entry is a single `int32` user ID. The message string follows after all IDs.
    header: SEND_ROOM_INVITE
  - id: 2448
    name: messenger.get_requests
    realm: messenger-social
    summary: Request the full list of pending friend requests
    since: nitro-1.6.6
    phase: session
    sender: 'Sent on demand to retrieve all outstanding friend requests addressed to the local user. Carries no payload.

      '
    receiver: 'The server queries all pending requests for the user and responds with `messenger.friend_requests` (s2c 280). Confirmed in GLADIATOR.

      '
    fields: []
    header: GET_FRIEND_REQUESTS
  - id: 516
    name: messenger.find_new_friends
    realm: messenger-social
    summary: Trigger the automated friend-finder process
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user activates the find-new-friends feature. Carries no payload. The server runs a matching algorithm and may forward the user to a pairing room.

      '
    receiver: 'The server initiates the find-friends matching process and responds with `messenger.find_friends_result` (s2c 1210) indicating whether matching succeeded. Confirmed in GLADIATOR.

      '
    fields: []
    header: FIND_NEW_FRIENDS
  - id: 1419
    name: messenger.refresh
    realm: messenger-social
    summary: Request a full refresh of the friend list
    since: nitro-1.6.6
    phase: session
    sender: 'Sent to force the server to re-send the complete friend list. Carries no payload. Used after the friend list UI is opened to ensure it is up to date.

      '
    receiver: 'The server re-sends the friend list fragments via `messenger.friends` (s2c 3130). Confirmed in GLADIATOR.

      '
    fields: []
    header: FRIEND_LIST_UPDATE
  - id: 2110
    name: navigator.init
    realm: navigator
    summary: Initialize the navigator and receive all initial state
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the client opens the navigator window for the first time in a session. Carries no payload. The server responds with a burst of packets that establish the full navigator state.

      '
    receiver: 'The server sends the following packets in sequence: `navigator.settings` (s2c 518), `navigator.metadata` (s2c 3052), `navigator.lifted` (s2c 3104), `navigator.collapsed` (s2c 1543), `navigator.saved_searches`
      (s2c 3984), `navigator.event_categories` (s2c 3244). Confirmed in GLADIATOR.

      '
    fields: []
    header: NAVIGATOR_INIT
  - id: 249
    name: navigator.search
    realm: navigator
    summary: Search for rooms within a named search category
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user performs a room search. The `code` field identifies which search tab or context is active (e.g., `"popular"`, `"my"`, `"friends"`). The `data` field carries the free-text
      query string; it may be empty for non-text searches.

      '
    receiver: 'The server runs the search corresponding to `code` filtered by `data` and responds with `navigator.search_result` (s2c 2690). Confirmed in GLADIATOR.

      '
    fields:
    - name: code
      type: string
      required: true
      description: 'Identifies the search context. The server maps each code to a query strategy (e.g. popular rooms, own rooms, rooms where friends are).

        '
    - name: data
      type: string
      required: true
      description: 'Free-text filter applied within the search context. May be an empty string when the search context does not require a text filter.

        '
    header: NAVIGATOR_SEARCH
  - id: 637
    name: navigator.search_open
    realm: navigator
    summary: Mark a search category tab as expanded
    since: nitro-1.6.6
    phase: session
    sender: 'Sent when the user clicks to expand a collapsed search category in the navigator. The server records this preference.

      '
    receiver: 'The server marks the category identified by `code` as open (not collapsed) for the user''s navigator state. No response packet is sent. Confirmed in GLADIATOR.

      '
    fields:
    - name: code
      type: string
      required: true
      description: Search category code to mark as expanded.
    header: NAVIGATOR_SEARCH_OPEN
  - id: 1834
    name: navigator.search_close
