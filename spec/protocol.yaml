  - id: 2998
    name: user.badge_request_fulfilled
    realm: achievements-talents
    summary: Report whether a promotional badge request was fulfilled
    since: nitro-1.6.6
    phase: session
    sender: 'Sent in response to `user.request_badge` (c2s 3077) or `user.check_badge_request` (c2s 1364). Indicates whether the badge associated with the request code was granted.

      '
    receiver: 'The client reads the result and shows a success or failure message to the user.

      '
    fields:
    - name: requestCode
      type: string
      required: true
      description: The promotional badge request code that was evaluated
    - name: fulfilled
      type: boolean
      required: true
